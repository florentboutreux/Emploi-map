<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recherche Emploi Map - Multi-Sources</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Animations fluides */
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideInBottom { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .slide-in-bottom { animation: slideInBottom 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .fade-in-down { animation: fadeInDown 0.4s ease-out forwards; }
        
        /* Personnalisation Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Glassmorphism effet */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        input:focus, button:focus, select:focus { outline: none; }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden text-gray-800 font-sans fixed inset-0">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- DONNÉES DE DÉMONSTRATION (Mock) ---
        const MOCK_JOBS = [
            { id: "FT1", intitule: "Développeur Full-Stack (H/F)", entreprise: { nom: "TECH INNOVATION" }, lieuTravail: { libelle: "75 - PARIS 08", latitude: 48.8738, longitude: 2.3116 }, salaire: { libelle: "45000€ à 55000€" }, dateCreation: new Date().toISOString(), description: "Vous concevrez des architectures complexes. Maîtrise de React et Node.js exigée.", typeContrat: "CDI", experienceLibelle: "Exp. exigée de 2 An(s)", teletravailPossible: true, source: "France Travail" },
            { id: "JB1", intitule: "Data Scientist Senior", entreprise: { nom: "DATA CORP GLOBAL (via Jobijoba)" }, lieuTravail: { libelle: "92 - LA DEFENSE", latitude: 48.8924, longitude: 2.2370 }, salaire: { libelle: "Non précisé" }, dateCreation: new Date(Date.now() - 3600000).toISOString(), description: "Rejoignez notre équipe IA. Modélisation prédictive et Machine Learning.", typeContrat: "CDI", experienceLibelle: "Senior (+5 ans)", teletravailPossible: true, source: "Jobijoba" },
            { id: "FT2", intitule: "Chef de Projet Marketing Digital", entreprise: { nom: "AGENCE DIGITALE" }, lieuTravail: { libelle: "75 - PARIS 11", latitude: 48.8629, longitude: 2.3800 }, salaire: { libelle: "3500€ mensuel" }, dateCreation: new Date(Date.now() - 86400000).toISOString(), description: "Pilotage de campagnes digitales 360.", typeContrat: "CDD", experienceLibelle: "Exp. 3 An(s)", teletravailPossible: false, source: "France Travail" },
        ];

        // Configuration visuelle des sources
        const getSourceConfig = (source) => {
            switch(source) {
                case 'Jobijoba': return { icon: 'fas fa-briefcase', colorClass: 'text-orange-700 bg-orange-50 border-orange-200' };
                case 'Remotive': return { icon: 'fas fa-globe', colorClass: 'text-teal-700 bg-teal-50 border-teal-200' };
                case 'LinkedIn': return { icon: 'fab fa-linkedin', colorClass: 'text-blue-700 bg-blue-50 border-blue-200' };
                case 'France Travail': return { icon: 'fas fa-building', colorClass: 'text-blue-900 bg-blue-100 border-blue-300' };
                default: return { icon: 'fas fa-briefcase', colorClass: 'text-gray-700 bg-gray-100 border-gray-200' };
            }
        };

        function App() {
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const [hasSearched, setHasSearched] = useState(false);
            const [jobs, setJobs] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [viewMode, setViewMode] = useState('search'); 
            const [errorMsg, setErrorMsg] = useState(null); // Gestion des erreurs visuelles
            
            const [addressQuery, setAddressQuery] = useState('');
            const [addressSuggestions, setAddressSuggestions] = useState([]);
            const [isSuggesting, setIsSuggesting] = useState(false);
            const [homeLatLng, setHomeLatLng] = useState(null); 
            
            // --- ETATS CONFIGURATION SERVEUR ---
            const [useRealApi, setUseRealApi] = useState(() => localStorage.getItem('ft_use_real') !== 'false');
            const [backendUrl, setBackendUrl] = useState(() => localStorage.getItem('ft_backend_url') || "https://emploi-map-backend.onrender.com/api/jobs");
            
            const [page, setPage] = useState(0);
            const [hasMore, setHasMore] = useState(false);
            const [isSearching, setIsSearching] = useState(false);
            const [isSearchExpanded, setIsSearchExpanded] = useState(true);

            const [isTestingBackend, setIsTestingBackend] = useState(false);
            const [backendTestResult, setBackendTestResult] = useState('');

            const [favoriteJobs, setFavoriteJobs] = useState(() => {
                const saved = localStorage.getItem('ft_favorites');
                return saved ? JSON.parse(saved) : [];
            });

            const [showFilters, setShowFilters] = useState(false);
            const [transportMode, setTransportMode] = useState('driving'); 
            const [maxDuration, setMaxDuration] = useState(45); 
            const [maxDistance, setMaxDistance] = useState(30); 
            
            const [filterContract, setFilterContract] = useState(''); 
            const [filterExperience, setFilterExperience] = useState(''); 
            const [filterRemote, setFilterRemote] = useState(false);
            const [filterSource, setFilterSource] = useState(''); 

            const [jobRoutes, setJobRoutes] = useState({}); 

            const [selectedJob, setSelectedJob] = useState(null); 
            const [detailedJob, setDetailedJob] = useState(null); 
            const [sortBy, setSortBy] = useState('duration');
            const [showSettings, setShowSettings] = useState(false);
            const [isMapLoaded, setIsMapLoaded] = useState(false);

            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({});
            const homeMarkerRef = useRef(null);
            const routeLayerRef = useRef(null);
            const suggestionBoxRef = useRef(null);

            useEffect(() => { localStorage.setItem('ft_favorites', JSON.stringify(favoriteJobs)); }, [favoriteJobs]);

            // Auto-hide du message d'erreur
            useEffect(() => {
                if (errorMsg) {
                    const timer = setTimeout(() => setErrorMsg(null), 8000);
                    return () => clearTimeout(timer);
                }
            }, [errorMsg]);

            const toggleFavorite = (job, e) => {
                e.stopPropagation();
                if (favoriteJobs.some(f => f.id === job.id)) setFavoriteJobs(favoriteJobs.filter(f => f.id !== job.id));
                else setFavoriteJobs([...favoriteJobs, job]);
            };

            const getCalculatedDuration = useCallback((baseDistanceKm, baseOsrmDurationMin, mode) => {
                if (mode === 'driving') return baseOsrmDurationMin;
                if (mode === 'cycling') return Math.round((baseDistanceKm / 15) * 60);
                if (mode === 'transit') return Math.round((baseDistanceKm / 20) * 60) + 10;
                return baseOsrmDurationMin;
            }, []);

            // --- INITIALISATION CARTE ---
            useEffect(() => {
                if (!mapRef.current || !window.L || mapInstanceRef.current) return;
                mapInstanceRef.current = window.L.map(mapRef.current, { zoomControl: false }).setView([46.603354, 1.888334], 6);
                window.L.control.zoom({ position: isMobile ? 'topleft' : 'bottomright' }).addTo(mapInstanceRef.current);
                window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(mapInstanceRef.current);
                setIsMapLoaded(true);
            }, [isMobile]);

            const createCustomIcon = (type, source = '', isSelected = false) => {
                if (!window.L) return null;
                let color = '#1e3a8a'; // Par défaut
                if (source === 'Jobijoba') color = '#c2410c';
                if (source === 'Remotive') color = '#0f766e';
                
                if (type === 'home') color = '#16a34a'; 
                else if (isSelected) color = '#dc2626'; 
                else if (type === 'favorite') color = '#ec4899'; 

                const svgPath = type === 'home' 
                    ? `<circle cx="12" cy="12" r="10" fill="${color}" stroke="white" stroke-width="2"/>`
                    : `<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="${color}" stroke="white" stroke-width="1"/>`;
                
                return window.L.divIcon({ html: `<svg viewBox="0 0 24 24" width="30" height="30" xmlns="http://www.w3.org/2000/svg">${svgPath}</svg>`, className: '', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30] });
            };

            // --- AUTOCOMPLÉTION ADRESSE ---
            useEffect(() => {
                if (!isSuggesting || addressQuery.length < 3) { setAddressSuggestions([]); return; }
                const timer = setTimeout(async () => {
                    try {
                        const response = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(addressQuery)}&limit=5`);
                        const data = await response.json();
                        setAddressSuggestions(data.features || []);
                    } catch (err) {}
                }, 300);
                return () => clearTimeout(timer);
            }, [addressQuery, isSuggesting]);

            const handleSelectAddress = (feature) => {
                setAddressQuery(feature.properties.label);
                setAddressSuggestions([]);
                setIsSuggesting(false);
                const coords = feature.geometry.coordinates;
                const latLng = { lat: coords[1], lng: coords[0], cityCode: feature.properties.citycode, villeNom: feature.properties.city };
                setHomeLatLng(latLng);
                
                if (homeMarkerRef.current) homeMarkerRef.current.remove();
                const icon = createCustomIcon('home');
                homeMarkerRef.current = window.L.marker([latLng.lat, latLng.lng], { icon })
                    .addTo(mapInstanceRef.current).bindPopup("<b>Votre domicile</b>").openPopup();
                mapInstanceRef.current.setView([latLng.lat, latLng.lng], 11);
                return latLng;
            };

            const updateMapBounds = useCallback((boundsToFit) => {
                if (!mapInstanceRef.current || !boundsToFit.isValid()) return;
                let ptTopLeft, ptBottomRight;
                
                if (isMobile) {
                    const topPadding = (hasSearched && !isSearchExpanded) ? 80 : (showFilters ? 400 : 200);
                    ptTopLeft = [10, topPadding];
                    ptBottomRight = [10, hasSearched ? window.innerHeight * 0.45 : 20];
                } else {
                    ptTopLeft = [hasSearched ? 450 : 50, hasSearched ? 100 : 50];
                    ptBottomRight = [50, 50];
                }
                
                mapInstanceRef.current.fitBounds(boundsToFit, { paddingTopLeft: ptTopLeft, paddingBottomRight: ptBottomRight });
            }, [isMobile, hasSearched, showFilters, isSearchExpanded]);

            // --- TEST DU SERVEUR ---
            const testBackendConnection = async () => {
                setIsTestingBackend(true);
                setBackendTestResult('<i class="fas fa-spinner fa-spin"></i> Test du serveur en cours (peut prendre 1 min si le serveur sort de veille)...');
                
                try {
                    const res = await fetch(`${backendUrl}?motsCles=test`);
                    if (!res.ok) {
                        const text = await res.text();
                        if (res.status === 404) setBackendTestResult(`❌ <b>Erreur 404</b><br/>Adresse incorrecte. Avez-vous bien ajouté <code>/api/jobs</code> ?`);
                        else setBackendTestResult(`❌ <b>Erreur ${res.status}</b><br/>Détail : <i>${text}</i>`);
                    } else {
                        setBackendTestResult(`✅ <b>Succès !</b><br/>Le serveur Backend est en ligne et communique correctement.`);
                    }
                } catch (err) {
                    setBackendTestResult(`❌ <b>Erreur Réseau</b><br/>Serveur introuvable ou en veille profonde. Vérifiez l'URL.`);
                }
                setIsTestingBackend(false);
            };

            // --- MOTEUR DE RECHERCHE ---
            const handleSearch = async (isLoadMore = false) => {
                if (isSearching) return;
                setIsSearching(true);
                setViewMode('search');
                setErrorMsg(null); // Reset erreur

                let currentHomeLatLng = homeLatLng;
                if (addressQuery && !currentHomeLatLng && addressSuggestions.length > 0) {
                    currentHomeLatLng = handleSelectAddress(addressSuggestions[0]);
                }

                const targetPage = isLoadMore ? page + 1 : 0;
                let fetchedJobs = [];

                try {
                    if (useRealApi) {
                        try {
                            const searchParams = new URLSearchParams();
                            if (searchQuery) searchParams.append('motsCles', searchQuery);
                            if (filterContract) searchParams.append('typeContrat', filterContract);
                            if (filterExperience) searchParams.append('experience', filterExperience);
                            if (filterRemote) searchParams.append('teletravailPossible', 'true');
                            if (filterSource) searchParams.append('source', filterSource);
                            
                            // Paramètres géographiques (INSEE pour FT, Nom pour RSS)
                            if (currentHomeLatLng) {
                                if (currentHomeLatLng.cityCode) searchParams.append('commune', currentHomeLatLng.cityCode);
                                if (currentHomeLatLng.villeNom) searchParams.append('villeNom', currentHomeLatLng.villeNom);
                                searchParams.append('distance', maxDistance); 
                            }

                            const start = targetPage * 20;
                            const end = start + 19;
                            searchParams.append('range', `${start}-${end}`);
                            
                            const queryString = searchParams.toString();
                            const jobsUrl = `${backendUrl}${queryString ? '?' + queryString : ''}`;
                            
                            const jobsRes = await fetch(jobsUrl);

                            if (!jobsRes.ok) {
                                const errorText = await jobsRes.text();
                                throw new Error(`Erreur du Backend (${jobsRes.status}): ${errorText}`);
                            }
                            
                            const jobsData = await jobsRes.json();
                            fetchedJobs = jobsData.resultats || [];
                            setHasMore(fetchedJobs.length === 20); 

                        } catch (error) {
                            console.error("Erreur Backend :", error);
                            setErrorMsg("⚠️ Impossible de joindre le Serveur Backend. Passage en mode Démonstration.");
                            fetchedJobs = mockSearch(targetPage, currentHomeLatLng);
                        }
                    } else {
                        await new Promise(resolve => setTimeout(resolve, 500)); 
                        fetchedJobs = mockSearch(targetPage, currentHomeLatLng);
                    }

                    if (currentHomeLatLng && fetchedJobs.length > 0) {
                        const newRoutes = { ...jobRoutes };
                        await Promise.all(fetchedJobs.map(async (job) => {
                            if (newRoutes[job.id] || !job.lieuTravail?.latitude) return;
                            const url = `https://router.project-osrm.org/route/v1/driving/${currentHomeLatLng.lng},${currentHomeLatLng.lat};${job.lieuTravail.longitude},${job.lieuTravail.latitude}?overview=false`;
                            try {
                                const res = await fetch(url);
                                const data = await res.json();
                                if (data.code === 'Ok' && data.routes.length > 0) {
                                    newRoutes[job.id] = {
                                        osrmDurationMin: Math.round(data.routes[0].duration / 60),
                                        distanceKm: parseFloat((data.routes[0].distance / 1000).toFixed(1))
                                    };
                                }
                            } catch (err) {}
                        }));
                        setJobRoutes(newRoutes);

                        fetchedJobs = fetchedJobs.filter(job => {
                            if (!newRoutes[job.id]) return false;
                            const currentModeDur = getCalculatedDuration(newRoutes[job.id].distanceKm, newRoutes[job.id].osrmDurationMin, transportMode);
                            return currentModeDur <= maxDuration;
                        });
                    }

                    if (isLoadMore) setJobs(prev => [...prev, ...fetchedJobs]);
                    else setJobs(fetchedJobs);
                    
                    setPage(targetPage);
                    setSelectedJob(null);
                    setHasSearched(true);
                    setShowFilters(false);
                    setIsSearchExpanded(false);
                } finally {
                    setIsSearching(false);
                }
            };

            const mockSearch = (targetPage, currentHomeLatLng) => {
                if (targetPage > 0) { setHasMore(false); return []; } 
                setHasMore(false);
                return MOCK_JOBS.filter(job => 
                    (job.intitule.toLowerCase().includes(searchQuery.toLowerCase()) || (job.description && job.description.toLowerCase().includes(searchQuery.toLowerCase()))) &&
                    (filterContract === '' || job.typeContrat.includes(filterContract)) &&
                    (!filterRemote || job.teletravailPossible === true) &&
                    (filterSource === '' || job.source === filterSource)
                );
            };

            const calculateRouteGeometry = useCallback(async (job, origin = homeLatLng) => {
                if (!job || !origin || !window.L || !mapInstanceRef.current || !job.lieuTravail?.latitude) return;
                try {
                    if (routeLayerRef.current) routeLayerRef.current.remove();
                    const url = `https://router.project-osrm.org/route/v1/driving/${origin.lng},${origin.lat};${job.lieuTravail.longitude},${job.lieuTravail.latitude}?overview=full&geometries=geojson`;
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.code === 'Ok' && data.routes.length > 0) {
                        let routeColor = transportMode === 'driving' ? '#2563eb' : transportMode === 'transit' ? '#9333ea' : '#16a34a';
                        routeLayerRef.current = window.L.geoJSON(data.routes[0].geometry, {
                            style: { color: routeColor, weight: 5, opacity: 0.8, dashArray: transportMode === 'transit' ? '5, 10' : null }
                        }).addTo(mapInstanceRef.current);

                        updateMapBounds(routeLayerRef.current.getBounds());
                    }
                } catch (err) { console.error("Erreur OSRM:", err); }
            }, [homeLatLng, transportMode, updateMapBounds]);

            useEffect(() => {
                if (selectedJob && homeLatLng) calculateRouteGeometry(selectedJob);
                else if (routeLayerRef.current) routeLayerRef.current.remove();
            }, [selectedJob, homeLatLng, calculateRouteGeometry]);

            useEffect(() => {
                if (!isMapLoaded || !window.L || !mapInstanceRef.current) return;
                Object.values(markersRef.current).forEach(marker => marker.remove());
                markersRef.current = {};

                const bounds = window.L.latLngBounds();
                let hasValidJobs = false;
                const displayList = viewMode === 'favorites' ? favoriteJobs : jobs;

                displayList.forEach(job => {
                    if (job.lieuTravail && job.lieuTravail.latitude && job.lieuTravail.longitude) {
                        const latLng = [job.lieuTravail.latitude, job.lieuTravail.longitude];
                        const isSelected = selectedJob?.id === job.id;
                        const isFav = favoriteJobs.some(f => f.id === job.id);
                        
                        const icon = createCustomIcon(isSelected ? 'selected' : (isFav ? 'favorite' : 'exact'), job.source, isSelected);
                        const marker = window.L.marker(latLng, { icon }).addTo(mapInstanceRef.current);
                        
                        marker.on('click', () => { setSelectedJob(job); setDetailedJob(job); });
                        markersRef.current[job.id] = marker;
                        bounds.extend(latLng);
                        hasValidJobs = true;
                    }
                });

                if (hasValidJobs && !selectedJob && !homeLatLng) {
                    updateMapBounds(bounds);
                }
            }, [jobs, favoriteJobs, viewMode, isMapLoaded, selectedJob, homeLatLng, updateMapBounds]);

            const displayJobs = useMemo(() => {
                let list = viewMode === 'favorites' ? [...favoriteJobs] : [...jobs];
                if (sortBy === 'date') {
                    list.sort((a, b) => new Date(b.dateCreation) - new Date(a.dateCreation));
                } else if (sortBy === 'duration' && homeLatLng) {
                    list.sort((a, b) => {
                        const durA = jobRoutes[a.id] ? getCalculatedDuration(jobRoutes[a.id].distanceKm, jobRoutes[a.id].osrmDurationMin, transportMode) : 9999;
                        const durB = jobRoutes[b.id] ? getCalculatedDuration(jobRoutes[b.id].distanceKm, jobRoutes[b.id].osrmDurationMin, transportMode) : 9999;
                        return durA - durB;
                    });
                }
                return list;
            }, [jobs, favoriteJobs, viewMode, sortBy, homeLatLng, jobRoutes, transportMode, getCalculatedDuration]);

            const formatTime = (minutes) => {
                if (minutes > 60) return `${Math.floor(minutes / 60)}h ${minutes % 60}min`;
                return `${minutes} min`;
            };

            return (
                <div className="relative w-full h-full bg-gray-100 overflow-hidden font-sans text-gray-800 flex flex-col md:flex-row">
                    
                    {/* --- CARTE (Fond) --- */}
                    <div ref={mapRef} className="absolute inset-0 z-0" />

                    {/* --- TOAST D'ERREUR --- */}
                    {errorMsg && (
                        <div className="absolute top-4 left-1/2 transform -translate-x-1/2 z-[5000] w-[90%] max-w-md">
                            <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-xl shadow-lg flex items-start gap-3 fade-in-down">
                                <i className="fas fa-exclamation-circle text-red-500 mt-0.5"></i>
                                <p className="text-sm text-red-800 font-medium flex-1">{errorMsg}</p>
                                <button onClick={() => setErrorMsg(null)} className="text-red-400 hover:text-red-600"><i className="fas fa-times"></i></button>
                            </div>
                        </div>
                    )}

                    {/* --- HEADER PETITS BOUTONS TOP-RIGHT --- */}
                    {(!isMobile || !hasSearched || !isSearchExpanded) && (
                        <div className="absolute top-4 right-4 z-[1000] flex gap-2">
                            <button onClick={() => {setViewMode('favorites'); setHasSearched(true); setIsSearchExpanded(false);}} className={`w-10 h-10 md:w-auto md:px-4 rounded-full shadow-lg font-bold transition flex items-center justify-center gap-2 ${viewMode === 'favorites' ? 'bg-pink-500 text-white' : 'glass-panel text-gray-700 hover:bg-gray-50'}`}>
                                <i className="fas fa-heart"></i> <span className="hidden md:inline">Favoris ({favoriteJobs.length})</span>
                            </button>
                            <button onClick={() => setShowSettings(true)} className="w-10 h-10 rounded-full shadow-lg glass-panel text-gray-700 hover:text-blue-600 transition flex items-center justify-center">
                                <i className="fas fa-cog"></i>
                            </button>
                        </div>
                    )}

                    {/* --- BARRE DE RECHERCHE MODERNE (Glassmorphism Pill) --- */}
                    <div className={`absolute z-[1000] transition-all duration-500 ease-in-out flex justify-center px-3 md:px-0 md:w-auto md:left-1/2 transform md:-translate-x-1/2
                        ${hasSearched 
                            ? 'top-4 w-full md:w-auto' 
                            : 'top-1/3 md:top-1/2 md:-translate-y-1/2 w-full'}`}>
                        
                        {isMobile && hasSearched && !isSearchExpanded ? (
                            <div className="w-full flex">
                                <div 
                                    className="glass-panel shadow-md rounded-full px-4 py-2.5 flex items-center justify-between gap-3 text-sm font-medium text-gray-700 cursor-pointer border border-gray-200 flex-1 mr-[100px]"
                                    onClick={() => setIsSearchExpanded(true)}
                                >
                                    <div className="flex items-center gap-2 truncate">
                                        <i className="fas fa-search text-blue-500 w-3 text-center"></i>
                                        <span className="truncate max-w-[90px]">{searchQuery || 'Toutes offres'}</span>
                                        <span className="text-gray-300">|</span>
                                        <i className="fas fa-map-marker-alt text-green-600 w-3 text-center"></i>
                                        <span className="truncate max-w-[90px]">{addressQuery || 'Partout'}</span>

                                            </button>

                                            {backendTestResult && (
                                                <div className="mt-3 p-3 bg-white border border-indigo-100 rounded-xl text-xs text-gray-700" dangerouslySetInnerHTML={{__html: backendTestResult}}></div>
                                            )}
                                        </div>

                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-200">
                                            <h4 className="text-xs font-bold text-green-800 mb-1"><i className="fas fa-shield-alt mr-1"></i> Sécurité Active</h4>
                                            <p className="text-[11px] text-green-700/80">Vos identifiants France Travail sont configurés en sécurité sur le serveur. Ils n'apparaissent jamais ici.</p>
                                        </div>

                                    </div>
                                </div>
                                <div className="p-5 bg-gray-50 border-t border-gray-100 flex gap-3">
                                    <button onClick={() => setShowSettings(false)} className="flex-1 bg-white text-gray-600 border border-gray-200 py-3 rounded-xl text-sm font-bold hover:bg-gray-100 transition">Annuler</button>
                                    <button onClick={() => { localStorage.setItem('ft_use_real', useRealApi); localStorage.setItem('ft_backend_url', backendUrl); setShowSettings(false); }} className="flex-1 bg-blue-600 text-white py-3 rounded-xl text-sm font-bold shadow-md hover:bg-blue-700 transition">Enregistrer</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
