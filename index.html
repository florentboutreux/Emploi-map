<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recherche Emploi Map - PRO</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Animations fluides */
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideInBottom { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .slide-in-bottom { animation: slideInBottom 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        /* Personnalisation Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Glassmorphism effet */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Enlever le focus outline sur mobile */
        input:focus, button:focus, select:focus { outline: none; }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden text-gray-800 font-sans fixed inset-0">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // =====================================================================
        // 🔗 ADRESSE DE VOTRE SERVEUR BACKEND (Render.com)
        // =====================================================================
        const MON_SERVEUR_BACKEND = "https://emploi-map-backend.onrender.com/api/jobs";
        // =====================================================================

        // --- DONNÉES DE DÉMONSTRATION (Mocks) ---
        const MOCK_JOBS = [
            { id: "145ABCD", intitule: "Développeur Full-Stack (H/F)", entreprise: { nom: "TECH INNOVATION", description: "Startup innovante." }, lieuTravail: { libelle: "75 - PARIS 08", latitude: 48.8738, longitude: 2.3116 }, salaire: { libelle: "45000€ à 55000€" }, dateCreation: new Date().toISOString(), description: "Vous concevrez des architectures complexes. Maîtrise de React et Node.js exigée.", typeContrat: "CDI", natureContrat: "Contrat travail", experienceLibelle: "Exp. exigée de 2 An(s)", teletravailPossible: true, competences: [{libelle: "React JS"}, {libelle: "Node.js"}], secteurActivite: "Édition de logiciels", contact: {nom: "Mme Dupont"} },
            { id: "145XYZA", intitule: "Ingénieur Système et Réseau (H/F)", entreprise: { nom: "GLOBAL NETWORKS" }, lieuTravail: { libelle: "92 - LA DEFENSE", latitude: 48.8924, longitude: 2.2370 }, salaire: { libelle: "38000€ à 42000€" }, dateCreation: new Date(Date.now() - 86400000).toISOString(), description: "Gestion des infrastructures cloud AWS et Azure.", typeContrat: "CDI", experienceLibelle: "Débutant accepté", teletravailPossible: false, competences: [{libelle: "AWS"}, {libelle: "Réseaux"}], secteurActivite: "Télécommunications" },
            { id: "146BQWE", intitule: "Chef de Projet IT (H/F)", entreprise: { nom: "AGENCE DIGITALE" }, lieuTravail: { libelle: "75 - PARIS 11", latitude: 48.8629, longitude: 2.3800 }, salaire: { libelle: "3000€ à 3500€ mensuel" }, dateCreation: new Date(Date.now() - 172800000).toISOString(), description: "Pilotage de projets web et méthodes agiles (Scrum).", typeContrat: "CDD", experienceLibelle: "Exp. exigée de 5 An(s)", teletravailPossible: true, competences: [{libelle: "Méthodes Agiles"}], secteurActivite: "Conseil informatique" }
        ];

        function App() {
            // --- ETATS RESPONSIVE ---
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // --- ETATS GLOBAUX ---
            const [hasSearched, setHasSearched] = useState(false);
            const [jobs, setJobs] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [viewMode, setViewMode] = useState('search'); 
            
            const [addressQuery, setAddressQuery] = useState('');
            const [addressSuggestions, setAddressSuggestions] = useState([]);
            const [isSuggesting, setIsSuggesting] = useState(false);
            const [homeLatLng, setHomeLatLng] = useState(null); 
            
            const [useRealApi, setUseRealApi] = useState(() => localStorage.getItem('ft_use_real') !== 'false');
            
            const [page, setPage] = useState(0);
            const [hasMore, setHasMore] = useState(false);
            const [isSearching, setIsSearching] = useState(false);

            const [favoriteJobs, setFavoriteJobs] = useState(() => {
                const saved = localStorage.getItem('ft_favorites');
                return saved ? JSON.parse(saved) : [];
            });

            const [showFilters, setShowFilters] = useState(false);
            const [transportMode, setTransportMode] = useState('driving'); 
            const [maxDuration, setMaxDuration] = useState(45); 
            const [maxDistance, setMaxDistance] = useState(30); 
            
            const [filterContract, setFilterContract] = useState(''); 
            const [filterExperience, setFilterExperience] = useState(''); 
            const [filterRemote, setFilterRemote] = useState(false);

            const [jobRoutes, setJobRoutes] = useState({}); 

            const [selectedJob, setSelectedJob] = useState(null); 
            const [detailedJob, setDetailedJob] = useState(null); 
            const [sortBy, setSortBy] = useState('duration');
            const [showSettings, setShowSettings] = useState(false);
            const [isMapLoaded, setIsMapLoaded] = useState(false);

            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({});
            const homeMarkerRef = useRef(null);
            const routeLayerRef = useRef(null);
            const suggestionBoxRef = useRef(null);

            useEffect(() => { localStorage.setItem('ft_favorites', JSON.stringify(favoriteJobs)); }, [favoriteJobs]);

            const toggleFavorite = (job, e) => {
                e.stopPropagation();
                if (favoriteJobs.some(f => f.id === job.id)) setFavoriteJobs(favoriteJobs.filter(f => f.id !== job.id));
                else setFavoriteJobs([...favoriteJobs, job]);
            };

            const getCalculatedDuration = useCallback((baseDistanceKm, baseOsrmDurationMin, mode) => {
                if (mode === 'driving') return baseOsrmDurationMin;
                if (mode === 'cycling') return Math.round((baseDistanceKm / 15) * 60);
                if (mode === 'transit') return Math.round((baseDistanceKm / 20) * 60) + 10;
                return baseOsrmDurationMin;
            }, []);

            // --- INITIALISATION CARTE ---
            useEffect(() => {
                if (!mapRef.current || !window.L || mapInstanceRef.current) return;
                mapInstanceRef.current = window.L.map(mapRef.current, { zoomControl: false }).setView([46.603354, 1.888334], 6);
                window.L.control.zoom({ position: isMobile ? 'topleft' : 'bottomright' }).addTo(mapInstanceRef.current);
                window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(mapInstanceRef.current);
                setIsMapLoaded(true);
            }, [isMobile]);

            const createCustomIcon = (type, isSelected = false) => {
                if (!window.L) return null;
                let color = '#2563eb'; 
                if (type === 'home') color = '#16a34a'; 
                else if (isSelected) color = '#dc2626'; 
                else if (type === 'favorite') color = '#ec4899'; 

                const svgPath = type === 'home' 
                    ? `<circle cx="12" cy="12" r="10" fill="${color}" stroke="white" stroke-width="2"/>`
                    : `<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="${color}" stroke="white" stroke-width="1"/>`;
                
                return window.L.divIcon({ html: `<svg viewBox="0 0 24 24" width="30" height="30" xmlns="http://www.w3.org/2000/svg">${svgPath}</svg>`, className: '', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30] });
            };

            // --- AUTOCOMPLÉTION ADRESSE ---
            useEffect(() => {
                if (!isSuggesting || addressQuery.length < 3) { setAddressSuggestions([]); return; }
                const timer = setTimeout(async () => {
                    try {
                        const response = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(addressQuery)}&limit=5`);
                        const data = await response.json();
                        setAddressSuggestions(data.features || []);
                    } catch (err) {}
                }, 300);
                return () => clearTimeout(timer);
            }, [addressQuery, isSuggesting]);

            const handleSelectAddress = (feature) => {
                setAddressQuery(feature.properties.label);
                setAddressSuggestions([]);
                setIsSuggesting(false);
                const coords = feature.geometry.coordinates;
                const latLng = { lat: coords[1], lng: coords[0], cityCode: feature.properties.citycode };
                setHomeLatLng(latLng);
                
                if (homeMarkerRef.current) homeMarkerRef.current.remove();
                const icon = createCustomIcon('home');
                homeMarkerRef.current = window.L.marker([latLng.lat, latLng.lng], { icon })
                    .addTo(mapInstanceRef.current).bindPopup("<b>Votre domicile</b>").openPopup();
                mapInstanceRef.current.setView([latLng.lat, latLng.lng], 11);
                return latLng;
            };

            // --- GESTION DU RECENTRAGE DYNAMIQUE DE LA CARTE ---
            const updateMapBounds = useCallback((boundsToFit) => {
                if (!mapInstanceRef.current || !boundsToFit.isValid()) return;
                
                // Décalages (padding) pour ne pas cacher les points sous les panneaux (Recherche en haut, Liste en bas/gauche)
                let ptTopLeft, ptBottomRight;
                
                if (isMobile) {
                    // Mobile : Barre de recherche prend ~160px en haut. Liste des offres prend ~45vh en bas.
                    ptTopLeft = [10, showFilters ? 350 : 160];
                    ptBottomRight = [10, hasSearched ? window.innerHeight * 0.45 : 20];
                } else {
                    // Desktop : Panneau latéral gauche prend ~420px. Search bar centrée en haut (~100px).
                    ptTopLeft = [hasSearched ? 450 : 50, hasSearched ? 100 : 50];
                    ptBottomRight = [50, 50];
                }
                
                mapInstanceRef.current.fitBounds(boundsToFit, { paddingTopLeft: ptTopLeft, paddingBottomRight: ptBottomRight });
            }, [isMobile, hasSearched, showFilters]);

            // --- MOTEUR DE RECHERCHE ---
            const handleSearch = async (isLoadMore = false) => {
                if (isSearching) return;
                setIsSearching(true);
                setViewMode('search');

                let currentHomeLatLng = homeLatLng;
                if (addressQuery && !currentHomeLatLng && addressSuggestions.length > 0) {
                    currentHomeLatLng = handleSelectAddress(addressSuggestions[0]);
                }

                const targetPage = isLoadMore ? page + 1 : 0;
                let fetchedJobs = [];

                try {
                    if (useRealApi) {
                        try {
                            const searchParams = new URLSearchParams();
                            if (searchQuery) searchParams.append('motsCles', searchQuery);
                            if (filterContract) searchParams.append('typeContrat', filterContract);
                            if (filterExperience) searchParams.append('experience', filterExperience);
                            if (filterRemote) searchParams.append('teletravailPossible', 'true');
                            if (currentHomeLatLng && currentHomeLatLng.cityCode) {
                                searchParams.append('commune', currentHomeLatLng.cityCode);
                                searchParams.append('distance', maxDistance); 
                            }
                            const start = targetPage * 20;
                            const end = start + 19;
                            searchParams.append('range', `${start}-${end}`);
                            
                            const jobsUrl = `${MON_SERVEUR_BACKEND}?${searchParams.toString()}`;
                            const jobsRes = await fetch(jobsUrl);

                            if (!jobsRes.ok) throw new Error(`Erreur Backend (${jobsRes.status})`);
                            const jobsData = await jobsRes.json();
                            fetchedJobs = jobsData.resultats || [];
                            setHasMore(fetchedJobs.length === 20); 

                        } catch (error) {
                            console.error("Erreur Backend :", error);
                            alert("⚠️ Impossible de joindre le Serveur Backend.\nPassage en mode Démonstration.");
                            fetchedJobs = mockSearch(targetPage, currentHomeLatLng);
                        }
                    } else {
                        await new Promise(resolve => setTimeout(resolve, 500)); 
                        fetchedJobs = mockSearch(targetPage, currentHomeLatLng);
                    }

                    if (currentHomeLatLng && fetchedJobs.length > 0) {
                        const newRoutes = { ...jobRoutes };
                        await Promise.all(fetchedJobs.map(async (job) => {
                            if (newRoutes[job.id] || !job.lieuTravail?.latitude) return;
                            const url = `https://router.project-osrm.org/route/v1/driving/${currentHomeLatLng.lng},${currentHomeLatLng.lat};${job.lieuTravail.longitude},${job.lieuTravail.latitude}?overview=false`;
                            try {
                                const res = await fetch(url);
                                const data = await res.json();
                                if (data.code === 'Ok' && data.routes.length > 0) {
                                    newRoutes[job.id] = {
                                        osrmDurationMin: Math.round(data.routes[0].duration / 60),
                                        distanceKm: parseFloat((data.routes[0].distance / 1000).toFixed(1))
                                    };
                                }
                            } catch (err) {}
                        }));
                        setJobRoutes(newRoutes);

                        fetchedJobs = fetchedJobs.filter(job => {
                            if (!newRoutes[job.id]) return false;
                            const currentModeDur = getCalculatedDuration(newRoutes[job.id].distanceKm, newRoutes[job.id].osrmDurationMin, transportMode);
                            return currentModeDur <= maxDuration;
                        });
                    }

                    if (isLoadMore) setJobs(prev => [...prev, ...fetchedJobs]);
                    else setJobs(fetchedJobs);
                    
                    setPage(targetPage);
                    setSelectedJob(null);
                    setHasSearched(true);
                    setShowFilters(false);
                } finally {
                    setIsSearching(false);
                }
            };

            const mockSearch = (targetPage, currentHomeLatLng) => {
                if (targetPage > 0) { setHasMore(false); return []; } 
                setHasMore(false);
                return MOCK_JOBS.filter(job => 
                    (job.intitule.toLowerCase().includes(searchQuery.toLowerCase()) || (job.description && job.description.toLowerCase().includes(searchQuery.toLowerCase()))) &&
                    (filterContract === '' || job.typeContrat.includes(filterContract)) &&
                    (!filterRemote || job.teletravailPossible === true)
                );
            };

            const calculateRouteGeometry = useCallback(async (job, origin = homeLatLng) => {
                if (!job || !origin || !window.L || !mapInstanceRef.current || !job.lieuTravail?.latitude) return;
                try {
                    if (routeLayerRef.current) routeLayerRef.current.remove();
                    const url = `https://router.project-osrm.org/route/v1/driving/${origin.lng},${origin.lat};${job.lieuTravail.longitude},${job.lieuTravail.latitude}?overview=full&geometries=geojson`;
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.code === 'Ok' && data.routes.length > 0) {
                        let routeColor = transportMode === 'driving' ? '#2563eb' : transportMode === 'transit' ? '#9333ea' : '#16a34a';
                        routeLayerRef.current = window.L.geoJSON(data.routes[0].geometry, {
                            style: { color: routeColor, weight: 5, opacity: 0.8, dashArray: transportMode === 'transit' ? '5, 10' : null }
                        }).addTo(mapInstanceRef.current);

                        updateMapBounds(routeLayerRef.current.getBounds());
                    }
                } catch (err) { console.error("Erreur OSRM:", err); }
            }, [homeLatLng, transportMode, updateMapBounds]);

            useEffect(() => {
                if (selectedJob && homeLatLng) calculateRouteGeometry(selectedJob);
                else if (routeLayerRef.current) routeLayerRef.current.remove();
            }, [selectedJob, homeLatLng, calculateRouteGeometry]);

            useEffect(() => {
                if (!isMapLoaded || !window.L || !mapInstanceRef.current) return;
                Object.values(markersRef.current).forEach(marker => marker.remove());
                markersRef.current = {};

                const bounds = window.L.latLngBounds();
                let hasValidJobs = false;
                const displayList = viewMode === 'favorites' ? favoriteJobs : jobs;

                displayList.forEach(job => {
                    if (job.lieuTravail && job.lieuTravail.latitude && job.lieuTravail.longitude) {
                        const latLng = [job.lieuTravail.latitude, job.lieuTravail.longitude];
                        const isSelected = selectedJob?.id === job.id;
                        const isFav = favoriteJobs.some(f => f.id === job.id);
                        
                        const icon = createCustomIcon(isSelected ? 'selected' : (isFav ? 'favorite' : 'exact'), isSelected);
                        const marker = window.L.marker(latLng, { icon }).addTo(mapInstanceRef.current);
                        
                        marker.on('click', () => { setSelectedJob(job); setDetailedJob(job); });
                        markersRef.current[job.id] = marker;
                        bounds.extend(latLng);
                        hasValidJobs = true;
                    }
                });

                if (hasValidJobs && !selectedJob && !homeLatLng) {
                    updateMapBounds(bounds);
                }
            }, [jobs, favoriteJobs, viewMode, isMapLoaded, selectedJob, homeLatLng, updateMapBounds]);

            const displayJobs = useMemo(() => {
                let list = viewMode === 'favorites' ? [...favoriteJobs] : [...jobs];
                if (sortBy === 'date') {
                    list.sort((a, b) => new Date(b.dateCreation) - new Date(a.dateCreation));
                } else if (sortBy === 'duration' && homeLatLng) {
                    list.sort((a, b) => {
                        const durA = jobRoutes[a.id] ? getCalculatedDuration(jobRoutes[a.id].distanceKm, jobRoutes[a.id].osrmDurationMin, transportMode) : 9999;
                        const durB = jobRoutes[b.id] ? getCalculatedDuration(jobRoutes[b.id].distanceKm, jobRoutes[b.id].osrmDurationMin, transportMode) : 9999;
                        return durA - durB;
                    });
                }
                return list;
            }, [jobs, favoriteJobs, viewMode, sortBy, homeLatLng, jobRoutes, transportMode, getCalculatedDuration]);

            const formatTime = (minutes) => {
                if (minutes > 60) return `${Math.floor(minutes / 60)}h ${minutes % 60}min`;
                return `${minutes} min`;
            };

            return (
                <div className="relative w-full h-full bg-gray-100 overflow-hidden font-sans text-gray-800 flex flex-col md:flex-row">
                    
                    {/* --- CARTE (Fond) --- */}
                    <div ref={mapRef} className="absolute inset-0 z-0" />

                    {/* --- HEADER PETITS BOUTONS TOP-RIGHT --- */}
                    <div className="absolute top-4 right-4 z-[1000] flex gap-2">
                        <button onClick={() => {setViewMode('favorites'); setHasSearched(true);}} className={`w-10 h-10 md:w-auto md:px-4 rounded-full shadow-lg font-bold transition flex items-center justify-center gap-2 ${viewMode === 'favorites' ? 'bg-pink-500 text-white' : 'glass-panel text-gray-700 hover:bg-gray-50'}`}>
                            <i className="fas fa-heart"></i> <span className="hidden md:inline">Favoris ({favoriteJobs.length})</span>
                        </button>
                        <button onClick={() => setShowSettings(true)} className="w-10 h-10 rounded-full shadow-lg glass-panel text-gray-700 hover:text-blue-600 transition flex items-center justify-center">
                            <i className="fas fa-cog"></i>
                        </button>
                    </div>

                    {/* --- BARRE DE RECHERCHE MODERNE (Glassmorphism Pill) --- */}
                    <div className={`absolute z-[1000] transition-all duration-500 ease-in-out flex justify-center w-full px-3 md:px-0 md:w-auto md:left-1/2 transform md:-translate-x-1/2
                        ${hasSearched 
                            ? 'top-4' 
                            : 'top-1/3 md:top-1/2 md:-translate-y-1/2'}`}>
                        
                        <div className={`glass-panel shadow-2xl transition-all duration-300 ${hasSearched ? 'rounded-2xl md:rounded-full w-full md:w-[600px] lg:w-[700px]' : 'rounded-3xl md:rounded-full w-full max-w-2xl'}`}>
                            
                            {/* Inputs Row */}
                            <div className="flex flex-col md:flex-row md:items-center p-2 gap-2 md:gap-0">
                                <div className="flex flex-1 items-center px-3 py-2 md:py-1">
                                    <i className="fas fa-search text-gray-400 mr-3"></i>
                                    <input type="text" placeholder="Métier, mots-clés..." className="w-full bg-transparent text-sm font-medium focus:outline-none text-gray-800 placeholder-gray-500" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSearch()}/>
                                </div>
                                
                                <div className="hidden md:block w-px h-8 bg-gray-300 mx-2"></div>
                                <div className="md:hidden h-px w-full bg-gray-200 my-1"></div>

                                <div className="relative flex flex-1 items-center px-3 py-2 md:py-1" ref={suggestionBoxRef}>
                                    <i className="fas fa-map-marker-alt text-blue-500 mr-3"></i>
                                    <input type="text" placeholder="Domicile (Ville...)" className="w-full bg-transparent text-sm font-medium focus:outline-none text-gray-800 placeholder-gray-500" value={addressQuery} onChange={(e) => { setAddressQuery(e.target.value); setIsSuggesting(true); if (homeLatLng) setHomeLatLng(null); }} onFocus={() => setIsSuggesting(true)} onKeyDown={(e) => e.key === 'Enter' && handleSearch()}/>
                                    
                                    {isSuggesting && addressSuggestions.length > 0 && (
                                        <div className="absolute top-full left-0 right-0 mt-3 glass-panel rounded-xl shadow-xl border border-white overflow-hidden z-[1001]">
                                            {addressSuggestions.map((feature) => (
                                                <div key={feature.properties.id} className="px-4 py-3 hover:bg-blue-50/50 cursor-pointer text-sm border-b border-gray-100 flex items-center gap-3" onClick={() => handleSelectAddress(feature)}>
                                                    <i className="fas fa-map-pin text-gray-400"></i><span className="truncate font-medium">{feature.properties.label}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="flex gap-2 px-2 pb-1 md:pb-0 md:px-0">
                                    <button onClick={() => setShowFilters(!showFilters)} className={`flex-1 md:flex-none p-3 md:p-2.5 rounded-xl md:rounded-full transition flex items-center justify-center relative ${showFilters ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 md:bg-transparent text-gray-600 hover:bg-gray-100'}`}>
                                        <i className="fas fa-sliders-h"></i>
                                        {(filterContract || filterRemote || maxDuration !== 45) && !showFilters && <span className="absolute top-1 right-1 w-2 h-2 bg-blue-500 rounded-full"></span>}
                                    </button>
                                    <button onClick={() => { setViewMode('search'); handleSearch(false); }} className="flex-[2] md:flex-none bg-blue-600 hover:bg-blue-700 text-white rounded-xl md:rounded-full px-6 py-3 md:py-2.5 text-sm font-bold shadow-md transition flex items-center justify-center" disabled={isSearching}>
                                        {isSearching ? <i className="fas fa-circle-notch fa-spin"></i> : <span className="md:hidden">Rechercher</span>}
                                        <i className="fas fa-arrow-right hidden md:block"></i>
                                    </button>
                                </div>
                            </div>

                            {/* FILTRES DÉROULANTS */}
                            <div className={`overflow-hidden transition-all duration-300 ease-in-out ${showFilters ? 'max-h-[800px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                <div className="p-4 md:px-6 md:pb-6 border-t border-gray-200/50 space-y-5">
                                    
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1 block">Contrat</label>
                                            <select value={filterContract} onChange={(e) => setFilterContract(e.target.value)} className="w-full text-sm bg-gray-50 border border-gray-200 rounded-xl py-2 px-3 outline-none focus:ring-2 focus:ring-blue-500">
                                                <option value="">Tous</option><option value="CDI">CDI</option><option value="CDD">CDD</option><option value="ALT">Alternance</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1 block">Expérience</label>
                                            <select value={filterExperience} onChange={(e) => setFilterExperience(e.target.value)} className="w-full text-sm bg-gray-50 border border-gray-200 rounded-xl py-2 px-3 outline-none focus:ring-2 focus:ring-blue-500">
                                                <option value="">Toutes</option><option value="1">Débutant</option><option value="2">1 à 3 ans</option><option value="3">+ 3 ans</option>
                                            </select>
                                        </div>
                                        <div className="col-span-2 md:col-span-1 flex items-center justify-between bg-gray-50 px-3 py-2 rounded-xl border border-gray-200 mt-0 md:mt-[18px]">
                                            <span className="text-sm font-semibold text-gray-700"><i className="fas fa-house-user text-green-600 mr-2"></i>Télétravail</span>
                                            <label className="relative inline-flex items-center cursor-pointer">
                                                <input type="checkbox" className="sr-only peer" checked={filterRemote} onChange={(e) => setFilterRemote(e.target.checked)}/>
                                                <div className="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-green-500"></div>
                                            </label>
                                        </div>
                                    </div>

                                    <div className="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="text-xs font-bold text-blue-900 uppercase tracking-wider"><i className="fas fa-route mr-1"></i> Trajet Local Max</label>
                                            <span className="text-sm font-black text-blue-700">{maxDuration === 120 ? 'Illimité' : formatTime(maxDuration)}</span>
                                        </div>
                                        <input type="range" min="10" max="120" step="5" value={maxDuration} onChange={(e) => setMaxDuration(parseInt(e.target.value))} disabled={!addressQuery} className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600 disabled:opacity-50"/>
                                        
                                        <div className="flex gap-2 mt-4">
                                            <button onClick={() => setTransportMode('driving')} className={`flex-1 py-1.5 text-xs rounded-xl font-bold transition ${transportMode === 'driving' ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200'}`}><i className="fas fa-car mr-1"></i> Auto</button>
                                            <button onClick={() => setTransportMode('transit')} className={`flex-1 py-1.5 text-xs rounded-xl font-bold transition ${transportMode === 'transit' ? 'bg-purple-600 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200'}`}><i className="fas fa-bus mr-1"></i> Transit</button>
                                            <button onClick={() => setTransportMode('cycling')} className={`flex-1 py-1.5 text-xs rounded-xl font-bold transition ${transportMode === 'cycling' ? 'bg-green-600 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200'}`}><i className="fas fa-bicycle mr-1"></i> Vélo</button>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                    )}

                    {/* --- LISTE DES OFFRES (BOTTOM SHEET SUR MOBILE, SIDEBAR SUR DESKTOP) --- */}
                    <div className={`absolute z-[990] transition-all duration-500 ease-in-out glass-panel shadow-[0_-10px_40px_rgba(0,0,0,0.1)] border border-gray-200
                        md:w-[420px] md:rounded-3xl md:left-4 md:bottom-4
                        ${isMobile ? 'bottom-0 left-0 w-full rounded-t-3xl' : ''}
                        ${hasSearched || viewMode === 'favorites' 
                            ? (isMobile ? 'h-[45vh] transform translate-y-0' : 'md:top-[100px] md:transform-none opacity-100 flex flex-col') 
                            : (isMobile ? 'transform translate-y-full' : 'md:-translate-x-[150%] opacity-0')}
                        `}
                        style={{ height: isMobile && (hasSearched || viewMode === 'favorites') ? '45vh' : undefined }}
                    >
                        {/* Drag indicator (Mobile only) */}
                        <div className="w-12 h-1.5 bg-gray-300 rounded-full mx-auto my-3 md:hidden"></div>

                        <div className="px-5 pb-3 pt-1 md:pt-5 border-b border-gray-200/50 flex items-center justify-between">
                            <span className="text-base text-gray-900 font-black tracking-tight">{displayJobs.length} {viewMode === 'favorites' ? 'Favoris' : 'Offres'}</span>
                            <select className="text-xs font-bold bg-gray-100 border-none rounded-lg py-1.5 px-3 text-gray-700 outline-none cursor-pointer" value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
                                <option value="duration">Plus rapide</option>
                                <option value="date">Plus récent</option>
                            </select>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-8">
                            {displayJobs.length === 0 ? (
                                <div className="text-center p-8 text-gray-400 mt-4">
                                    <i className={`fas ${viewMode === 'favorites' ? 'fa-heart-broken' : 'fa-search-location'} text-4xl mb-4 opacity-30`}></i>
                                    <p className="text-sm font-medium">{viewMode === 'favorites' ? "Aucun favori enregistré." : "Aucune offre ne correspond à vos critères."}</p>
                                </div>
                            ) : (
                                displayJobs.map((job) => {
                                    const route = jobRoutes[job.id];
                                    const estDur = route ? getCalculatedDuration(route.distanceKm, route.osrmDurationMin, transportMode) : null;
                                    const isFav = favoriteJobs.some(f => f.id === job.id);
                                    const isSel = selectedJob?.id === job.id;

                                    return (
                                        <div key={job.id} onClick={() => { setSelectedJob(job); setDetailedJob(job); }} 
                                            className={`bg-white p-4 rounded-2xl border-2 transition-all cursor-pointer shadow-sm ${isSel ? 'border-blue-500 scale-[1.02] shadow-md' : 'border-gray-100 hover:border-blue-200'}`}>
                                            <div className="flex justify-between items-start gap-2 mb-1.5">
                                                <h3 className="font-bold text-gray-900 leading-tight text-sm line-clamp-2 pr-2">{job.intitule}</h3>
                                                <button onClick={(e) => toggleFavorite(job, e)} className="text-lg p-1 -mr-2 -mt-2 transition transform hover:scale-110">
                                                    <i className={`${isFav ? 'fas text-pink-500' : 'far text-gray-300 hover:text-pink-300'} fa-heart`}></i>
                                                </button>
                                            </div>
                                            <p className="text-xs text-gray-500 font-semibold mb-3 truncate"><i className="far fa-building mr-1"></i> {job.entreprise?.nom || 'Confidentiel'}</p>
                                            
                                            <div className="flex flex-wrap gap-1.5 mb-3">
                                                <span className="bg-gray-100 text-gray-700 text-[10px] font-bold px-2 py-0.5 rounded-md">{job.typeContrat || 'CDI'}</span>
                                                {job.teletravailPossible && <span className="bg-green-50 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded-md"><i className="fas fa-house-user"></i> Télétravail</span>}
                                            </div>
                                            
                                            <div className="flex items-center justify-between">
                                                <div className="text-xs text-gray-500 font-medium truncate max-w-[60%]"><i className="fas fa-map-marker-alt text-gray-400 mr-1"></i> {job.lieuTravail?.libelle}</div>
                                                {estDur && (
                                                    <div className={`text-[11px] font-black px-2 py-1 rounded-lg flex items-center gap-1.5 ${transportMode === 'driving' ? 'bg-blue-100 text-blue-800' : transportMode === 'transit' ? 'bg-purple-100 text-purple-800' : 'bg-green-100 text-green-800'}`}>
                                                        <i className={`fas ${transportMode === 'driving' ? 'fa-car' : transportMode === 'transit' ? 'fa-bus' : 'fa-bicycle'}`}></i> {formatTime(estDur)}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                            
                            {viewMode === 'search' && hasMore && displayJobs.length > 0 && (
                                <button onClick={() => handleSearch(true)} className="w-full bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-3 rounded-2xl transition" disabled={isSearching}>
                                    {isSearching ? <i className="fas fa-spinner fa-spin"></i> : 'Afficher plus de résultats'}
                                </button>
                            )}
                        </div>
                    </div>

                    {/* --- PANNEAU DE DÉTAIL ENRICHI --- */}
                    {detailedJob && (
                        <div className="fixed inset-0 z-[3000] flex md:justify-end items-end md:items-stretch bg-black/40 backdrop-blur-sm transition-opacity">
                            <div className={`bg-white w-full md:w-[500px] h-[85vh] md:h-full shadow-2xl flex flex-col ${isMobile ? 'rounded-t-3xl slide-in-bottom' : 'slide-in-right'}`}>
                                
                                {/* Header Detail */}
                                <div className="p-5 md:p-6 border-b border-gray-100 bg-white flex justify-between items-start sticky top-0 z-10 md:rounded-none rounded-t-3xl">
                                    <div className="flex-1 pr-4">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="bg-blue-100 text-blue-800 text-[10px] font-black px-2.5 py-1 rounded-md uppercase tracking-wider">{detailedJob.typeContrat}</span>
                                            <span className="text-[10px] font-bold text-gray-400 uppercase"><i className="far fa-calendar-alt"></i> {new Date(detailedJob.dateCreation).toLocaleDateString('fr-FR')}</span>
                                        </div>
                                        <h2 className="text-xl font-black text-gray-900 leading-tight mb-1">{detailedJob.intitule}</h2>
                                        <p className="text-gray-500 font-semibold text-sm flex items-center gap-2"><i className="far fa-building"></i> {detailedJob.entreprise?.nom || 'Confidentiel'}</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={(e) => toggleFavorite(detailedJob, e)} className="w-10 h-10 rounded-full bg-gray-50 text-xl transition hover:scale-105 flex items-center justify-center">
                                            <i className={`${favoriteJobs.some(f => f.id === detailedJob.id) ? 'fas text-pink-500' : 'far text-gray-300'} fa-heart`}></i>
                                        </button>
                                        <button onClick={() => {setDetailedJob(null); setSelectedJob(null);}} className="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 flex items-center justify-center transition">
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>
                                </div>

                                {/* Body Detail */}
                                <div className="p-5 md:p-6 overflow-y-auto flex-1 space-y-6 bg-gray-50">
                                    
                                    {/* Grille Infos Clés */}
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-100"><i className="fas fa-map-marker-alt text-blue-500 text-lg mb-1 block"></i><p className="text-[10px] text-gray-500 font-bold uppercase">Lieu</p><p className="text-sm font-bold text-gray-800 truncate">{detailedJob.lieuTravail?.libelle}</p></div>
                                        <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-100"><i className="fas fa-euro-sign text-green-500 text-lg mb-1 block"></i><p className="text-[10px] text-gray-500 font-bold uppercase">Salaire</p><p className="text-sm font-bold text-gray-800 truncate">{detailedJob.salaire?.libelle || 'Non précisé'}</p></div>
                                        <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-100"><i className="fas fa-graduation-cap text-purple-500 text-lg mb-1 block"></i><p className="text-[10px] text-gray-500 font-bold uppercase">Expérience</p><p className="text-sm font-bold text-gray-800 truncate">{detailedJob.experienceLibelle || 'Non précisée'}</p></div>
                                        <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-100"><i className="fas fa-briefcase text-orange-500 text-lg mb-1 block"></i><p className="text-[10px] text-gray-500 font-bold uppercase">Secteur</p><p className="text-sm font-bold text-gray-800 truncate">{detailedJob.secteurActivite || 'Non précisé'}</p></div>
                                    </div>

                                    {/* Description */}
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                        <h3 className="text-sm font-black text-gray-800 mb-3 uppercase tracking-wide"><i className="fas fa-align-left text-gray-400 mr-2"></i>Le Poste</h3>
                                        <p className="text-gray-600 text-sm whitespace-pre-wrap leading-relaxed">{detailedJob.description}</p>
                                    </div>

                                    {/* Compétences */}
                                    {detailedJob.competences && detailedJob.competences.length > 0 && (
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                        <h3 className="text-sm font-black text-gray-800 mb-3 uppercase tracking-wide"><i className="fas fa-tools text-gray-400 mr-2"></i>Compétences</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {detailedJob.competences.map((c, i) => (
                                                <span key={i} className="bg-blue-50 text-blue-700 font-semibold text-xs px-3 py-1.5 rounded-lg">{c.libelle}</span>
                                            ))}
                                        </div>
                                    </div>
                                    )}

                                </div>

                                {/* Footer Detail */}
                                <div className="p-4 md:p-6 border-t border-gray-100 bg-white">
                                    <button onClick={() => window.open(`https://candidat.francetravail.fr/offres/recherche/detail/${detailedJob.id}`, '_blank')} className="w-full bg-gray-900 hover:bg-black text-white font-bold py-3.5 md:py-3 rounded-xl shadow-lg transition flex justify-center items-center gap-2">
                                        Voir l'offre officielle <i className="fas fa-external-link-alt text-sm opacity-70"></i>
                                    </button>
                                </div>

                            </div>
                        </div>
                    )}

                    {/* --- MODAL PARAMÈTRES --- */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[4000] flex items-center justify-center bg-black/50 p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden slide-in-bottom">
                                <div className="px-6 py-5 border-b border-gray-100 flex justify-between items-center">
                                    <h2 className="font-black text-gray-800 text-lg">Réglages</h2>
                                    <button onClick={() => setShowSettings(false)} className="text-gray-400 hover:text-gray-700 bg-gray-100 w-8 h-8 rounded-full flex items-center justify-center"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div className="flex items-center justify-between">
                                        <span className="text-sm font-bold text-gray-800">Mode Connecté (API)</span>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={useRealApi} onChange={(e) => setUseRealApi(e.target.checked)}/>
                                            <div className="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                        </label>
                                    </div>
                                    <p className="text-[11px] font-semibold text-gray-500 leading-tight">Si activé, interroge le Backend Render. Sinon, utilise les données factices de démonstration.</p>
                                </div>
                                <div className="p-4 bg-gray-50 border-t border-gray-100">
                                    <button onClick={() => { localStorage.setItem('ft_use_real', useRealApi); setShowSettings(false); }} className="w-full bg-blue-600 text-white py-2.5 rounded-xl text-sm font-bold shadow-md">Enregistrer</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
