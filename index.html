<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche Emploi Map - PRO</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Animation pour le panneau latéral de détail */
        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
        
        /* Personnalisation de la barre de défilement */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // =====================================================================
        // 🔑 CONFIGURATION DE L'API FRANCE TRAVAIL
        // =====================================================================
        const DEFAULT_FT_CLIENT_ID = ""; // Ex: "PAR_votre_projet_..."
        const DEFAULT_FT_CLIENT_SECRET = ""; // Ex: "a1b2c3d4-..."
        // =====================================================================

        // --- DONNÉES DE DÉMONSTRATION ENRICHIES ---
        const MOCK_JOBS = [
            { id: "145ABCD", intitule: "Développeur Full-Stack (H/F)", entreprise: { nom: "TECH INNOVATION", description: "Startup innovante dans la GreenTech." }, lieuTravail: { libelle: "75 - PARIS 08", latitude: 48.8738, longitude: 2.3116 }, salaire: { libelle: "45000€ à 55000€" }, dateCreation: "2024-05-20T10:30:00.000Z", description: "Vous concevrez des architectures complexes. Maîtrise de React et Node.js exigée. Esprit d'équipe indispensable.", typeContrat: "CDI", natureContrat: "Contrat travail", experienceLibelle: "Expérience exigée de 2 An(s)", teletravailPossible: true, competences: [{libelle: "React JS"}, {libelle: "Node.js"}, {libelle: "Git"}], secteurActivite: "Édition de logiciels", contact: {nom: "Mme Dupont", coordonnees1: "recrutement@tech.fr"} },
            { id: "145XYZA", intitule: "Ingénieur Système et Réseau (H/F)", entreprise: { nom: "GLOBAL NETWORKS" }, lieuTravail: { libelle: "92 - LA DEFENSE", latitude: 48.8924, longitude: 2.2370 }, salaire: { libelle: "38000€ à 42000€" }, dateCreation: "2024-05-19T14:15:00.000Z", description: "Gestion des infrastructures cloud AWS et Azure.", typeContrat: "CDI", experienceLibelle: "Débutant accepté", teletravailPossible: false, competences: [{libelle: "AWS"}, {libelle: "Réseaux TCP/IP"}], secteurActivite: "Télécommunications" },
            { id: "146BQWE", intitule: "Chef de Projet IT (H/F)", entreprise: { nom: "AGENCE DIGITALE" }, lieuTravail: { libelle: "75 - PARIS 11", latitude: 48.8629, longitude: 2.3800 }, salaire: { libelle: "3000€ à 3500€ mensuel" }, dateCreation: "2024-05-21T09:00:00.000Z", description: "Pilotage de projets web et méthodes agiles (Scrum).", typeContrat: "CDD", experienceLibelle: "Expérience exigée de 5 An(s)", teletravailPossible: true, competences: [{libelle: "Méthodes Agiles"}, {libelle: "Management"}], secteurActivite: "Conseil en systèmes informatiques" },
            { id: "148SIMI", intitule: "Intégrateur Web HTML/CSS (H/F)", entreprise: { nom: "WEB AGENCY 93" }, lieuTravail: { libelle: "93 - MONTREUIL", latitude: 48.8623, longitude: 2.4412 }, salaire: { libelle: "30000€" }, dateCreation: "2024-05-22T09:00:00.000Z", description: "Intégration web responsive pixel perfect.", typeContrat: "CDI", experienceLibelle: "Débutant accepté", teletravailPossible: false, competences: [{libelle: "HTML5"}, {libelle: "CSS3"}], secteurActivite: "Création de sites internet" }
        ];

        // --- GESTIONNAIRE DE REQUÊTES AVEC RÉESSAI (Gestion Quotas HTTP 429) ---
        const fetchWithRetry = async (url, options, retries = 3) => {
            try {
                const res = await fetch(url, options);
                if (res.status === 429 && retries > 0) {
                    const retryAfter = parseInt(res.headers.get('Retry-After') || '2', 10);
                    console.warn(`Quota API France Travail dépassé (429). Retentative dans ${retryAfter} secondes...`);
                    await new Promise(resolve => setTimeout(resolve, retryAfter * 1000));
                    return fetchWithRetry(url, options, retries - 1);
                }
                return res;
            } catch (error) {
                throw error;
            }
        };

        function App() {
            // --- ÉTATS GLOBAUX ---
            const [hasSearched, setHasSearched] = useState(false);
            const [jobs, setJobs] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [viewMode, setViewMode] = useState('search'); 
            
            // --- AUTO-COMPLÉTION & GÉOGRAPHIE ---
            const [addressQuery, setAddressQuery] = useState('');
            const [addressSuggestions, setAddressSuggestions] = useState([]);
            const [isSuggesting, setIsSuggesting] = useState(false);
            const [homeLatLng, setHomeLatLng] = useState(null); 
            
            // --- API & PARAMETRES ---
            const [useRealApi, setUseRealApi] = useState(() => (localStorage.getItem('ft_use_real') === 'true' || DEFAULT_FT_CLIENT_ID !== ""));
            const [useCorsProxy, setUseCorsProxy] = useState(() => localStorage.getItem('ft_use_cors_proxy') !== 'false');
            const [customProxyUrl, setCustomProxyUrl] = useState(() => localStorage.getItem('ft_custom_proxy_url') || 'https://corsproxy.io/?');
            const [ftClientId, setFtClientId] = useState(() => localStorage.getItem('ft_client_id') || DEFAULT_FT_CLIENT_ID);
            const [ftClientSecret, setFtClientSecret] = useState(() => localStorage.getItem('ft_client_secret') || DEFAULT_FT_CLIENT_SECRET);
            
            // --- ETATS TEST API ---
            const [isTestingApi, setIsTestingApi] = useState(false);
            const [apiTestResult, setApiTestResult] = useState('');

            const [page, setPage] = useState(0);
            const [hasMore, setHasMore] = useState(false);
            const [isSearching, setIsSearching] = useState(false);

            // --- FAVORIS ---
            const [favoriteJobs, setFavoriteJobs] = useState(() => {
                const saved = localStorage.getItem('ft_favorites');
                return saved ? JSON.parse(saved) : [];
            });

            // --- FILTRES AVANCÉS ---
            const [showFilters, setShowFilters] = useState(false);
            const [transportMode, setTransportMode] = useState('driving'); 
            const [maxDuration, setMaxDuration] = useState(45); 
            const [maxDistance, setMaxDistance] = useState(30); 
            
            const [filterContract, setFilterContract] = useState(''); 
            const [filterExperience, setFilterExperience] = useState(''); 
            const [filterTime, setFilterTime] = useState(''); 
            const [filterRemote, setFilterRemote] = useState(false);

            const [jobRoutes, setJobRoutes] = useState({}); 

            // --- UI ---
            const [selectedJob, setSelectedJob] = useState(null); 
            const [detailedJob, setDetailedJob] = useState(null); 
            const [sortBy, setSortBy] = useState('duration');
            const [showSettings, setShowSettings] = useState(false);
            const [isMapLoaded, setIsMapLoaded] = useState(false);

            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({});
            const homeMarkerRef = useRef(null);
            const routeLayerRef = useRef(null);
            const suggestionBoxRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('ft_favorites', JSON.stringify(favoriteJobs));
            }, [favoriteJobs]);

            const toggleFavorite = (job, e) => {
                e.stopPropagation();
                if (favoriteJobs.some(f => f.id === job.id)) {
                    setFavoriteJobs(favoriteJobs.filter(f => f.id !== job.id));
                } else {
                    setFavoriteJobs([...favoriteJobs, job]);
                }
            };

            const getCalculatedDuration = useCallback((baseDistanceKm, baseOsrmDurationMin, mode) => {
                if (mode === 'driving') return baseOsrmDurationMin;
                if (mode === 'cycling') return Math.round((baseDistanceKm / 15) * 60);
                if (mode === 'transit') return Math.round((baseDistanceKm / 20) * 60) + 10;
                return baseOsrmDurationMin;
            }, []);

            useEffect(() => {
                if (!mapRef.current || !window.L || mapInstanceRef.current) return;
                mapInstanceRef.current = window.L.map(mapRef.current, { zoomControl: false }).setView([46.603354, 1.888334], 6);
                window.L.control.zoom({ position: 'topright' }).addTo(mapInstanceRef.current);
                window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(mapInstanceRef.current);
                setIsMapLoaded(true);
            }, []);

            const createCustomIcon = (type, isSelected = false) => {
                if (!window.L) return null;
                let color = '#2563eb'; 
                if (type === 'home') color = '#16a34a'; 
                else if (isSelected) color = '#dc2626'; 
                else if (type === 'favorite') color = '#ec4899'; 

                const svgPath = type === 'home' 
                    ? `<circle cx="12" cy="12" r="10" fill="${color}" stroke="white" stroke-width="2"/>`
                    : `<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="${color}" stroke="white" stroke-width="1"/>`;
                
                return window.L.divIcon({ html: `<svg viewBox="0 0 24 24" width="30" height="30" xmlns="http://www.w3.org/2000/svg">${svgPath}</svg>`, className: '', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30] });
            };

            useEffect(() => {
                if (!isSuggesting || addressQuery.length < 3) { setAddressSuggestions([]); return; }
                const timer = setTimeout(async () => {
                    try {
                        const response = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(addressQuery)}&limit=5`);
                        const data = await response.json();
                        setAddressSuggestions(data.features || []);
                    } catch (err) { console.error(err); }
                }, 300);
                return () => clearTimeout(timer);
            }, [addressQuery, isSuggesting]);

            const handleSelectAddress = (feature) => {
                setAddressQuery(feature.properties.label);
                setAddressSuggestions([]);
                setIsSuggesting(false);
                const coords = feature.geometry.coordinates;
                const latLng = { lat: coords[1], lng: coords[0], cityCode: feature.properties.citycode };
                setHomeLatLng(latLng);
                
                if (homeMarkerRef.current) homeMarkerRef.current.remove();
                const icon = createCustomIcon('home');
                homeMarkerRef.current = window.L.marker([latLng.lat, latLng.lng], { icon })
                    .addTo(mapInstanceRef.current).bindPopup("<b>Votre domicile</b>").openPopup();
                mapInstanceRef.current.setView([latLng.lat, latLng.lng], 11);
                return latLng;
            };

            // --- FONCTION DE TEST API DÉDIÉE ---
            const testApiConnection = async () => {
                setIsTestingApi(true);
                setApiTestResult('<i class="fas fa-spinner fa-spin"></i> Test en cours...');
                try {
                    let tokenUrl = 'https://entreprise.francetravail.fr/connexion/oauth2/access_token?realm=%2Fpartenaire';
                    if (useCorsProxy) tokenUrl = `${customProxyUrl}${encodeURIComponent(tokenUrl)}`;

                    const tokenParams = new URLSearchParams();
                    tokenParams.append('grant_type', 'client_credentials');
                    tokenParams.append('client_id', ftClientId);
                    tokenParams.append('client_secret', ftClientSecret);
                    tokenParams.append('scope', 'api_offresdemploiv2 o2dsoffre');

                    const tokenRes = await fetch(tokenUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: tokenParams.toString()
                    });

                    if (!tokenRes.ok) {
                        const status = tokenRes.status;
                        if (status === 403) {
                            setApiTestResult(`
                                ❌ <b class="text-red-600">Erreur 403 (Accès Refusé)</b><br/><br/>
                                <b>Cause 1 : Droits manquants (Très fréquent)</b><br/>
                                Allez sur votre espace <i>francetravail.io</i> -> Votre application. Avez-vous bien cliqué sur "Souscrire à une API" et ajouté <b>Offres d'emploi v2</b> ?<br/><br/>
                                <b>Cause 2 : Proxy bloqué</b><br/>
                                Le pare-feu de France Travail bloque l'adresse IP du proxy public (${customProxyUrl}).<br/>
                                <i>Solution : Essayez l'autre proxy dans la liste déroulante, ou créez votre propre serveur Backend (Node.js/PHP).</i>
                            `);
                        } else if (status === 400 || status === 401) {
                            setApiTestResult(`❌ <b>Erreur ${status} (Non autorisé)</b><br/>Vos identifiants (Client ID / Secret) sont incorrects ou mal recopiés.`);
                        } else {
                            setApiTestResult(`❌ <b>Erreur ${status}</b><br/>Échec inattendu de l'authentification.`);
                        }
                        setIsTestingApi(false);
                        return;
                    }
                    
                    const tokenData = await tokenRes.json();
                    
                    let jobsUrlBase = `https://api.francetravail.io/partenaire/offresdemploi/v2/offres/search?motsCles=test&range=0-1`;
                    let jobsUrl = useCorsProxy ? `${customProxyUrl}${encodeURIComponent(jobsUrlBase)}` : jobsUrlBase;
                    
                    const jobsRes = await fetch(jobsUrl, {
                        headers: { Authorization: `Bearer ${tokenData.access_token}`, Accept: 'application/json' }
                    });

                    if (!jobsRes.ok) {
                        if (jobsRes.status === 403) {
                            setApiTestResult(`❌ <b>Token OK, mais Recherche 403 (Refusée)</b><br/>Vous avez un token, mais pas l'autorisation d'utiliser l'API "Offres". Vérifiez vos souscriptions sur francetravail.io.`);
                        } else {
                            setApiTestResult(`❌ <b>Auth OK, mais Recherche KO (Code ${jobsRes.status})</b>`);
                        }
                    } else {
                        setApiTestResult(`✅ <b>Succès !</b><br/>L'API France Travail communique parfaitement avec l'application.`);
                    }
                } catch (err) {
                    setApiTestResult(`
                        ❌ <b class="text-red-600">Erreur Réseau (CORS)</b><br/><br/>
                        <b>Détail :</b> ${err.message}<br/><br/>
                        Le navigateur interdit d'appeler directement France Travail pour des raisons de sécurité.<br/>
                        Si l'option Proxy est cochée et que vous avez cette erreur, c'est que le Proxy est hors-service ou bloqué. 
                        <b>Pour une vraie application en production, un serveur Backend est obligatoire.</b>
                    `);
                }
                setIsTestingApi(false);
            };

            // --- MOTEUR DE RECHERCHE PRINCIPAL ---
            const handleSearch = async (isLoadMore = false) => {
                if (isSearching) return;
                setIsSearching(true);
                setViewMode('search');

                let currentHomeLatLng = homeLatLng;
                if (addressQuery && !currentHomeLatLng && addressSuggestions.length > 0) {
                    currentHomeLatLng = handleSelectAddress(addressSuggestions[0]);
                }

                const targetPage = isLoadMore ? page + 1 : 0;
                let fetchedJobs = [];
const MON_SERVEUR_BACKEND = "https://emploi-map-backend.onrender.com";
                try {
                    if (useRealApi && ftClientId && ftClientSecret) {
                      try {
            // On prépare les paramètres (mots clés, ville, etc.)
            const searchParams = new URLSearchParams();
            if (searchQuery) searchParams.append('motsCles', searchQuery);
            if (filterContract) searchParams.append('typeContrat', filterContract);
            if (filterExperience) searchParams.append('experience', filterExperience);
            if (filterTime) searchParams.append('tempsPlein', filterTime);
            if (filterRemote) searchParams.append('teletravailPossible', 'true');
            if (currentHomeLatLng && currentHomeLatLng.cityCode) {
                searchParams.append('commune', currentHomeLatLng.cityCode);
                searchParams.append('distance', maxDistance); 
            }
            const start = targetPage * 20;
            const end = start + 19;
            searchParams.append('range', `${start}-${end}`);
            
            // On appelle NOTRE serveur backend (qui se charge du Token et de France Travail)
            const queryString = searchParams.toString();
            const jobsUrl = `${MON_SERVEUR_BACKEND}${queryString ? '?' + queryString : ''}`;
            
            const jobsRes = await fetch(jobsUrl);

            if (!jobsRes.ok) throw new Error(`Erreur du Backend: ${jobsRes.status}`);
            
            const jobsData = await jobsRes.json();
            fetchedJobs = jobsData.resultats || [];
            setHasMore(fetchedJobs.length === 20); 

        } catch (error) {
            console.error("Erreur avec le serveur backend:", error);
            alert("Erreur de connexion au serveur Backend. Vérifiez qu'il est bien démarré sur Render.com.");
            fetchedJobs = mockSearch(targetPage, currentHomeLatLng);
        }
                    } else {
                        await new Promise(resolve => setTimeout(resolve, 500)); 
                        fetchedJobs = mockSearch(targetPage, currentHomeLatLng);
                    }

                    if (currentHomeLatLng && fetchedJobs.length > 0) {
                        const newRoutes = { ...jobRoutes };
                        await Promise.all(fetchedJobs.map(async (job) => {
                            if (newRoutes[job.id] || !job.lieuTravail?.latitude) return;
                            const destLat = job.lieuTravail.latitude;
                            const destLng = job.lieuTravail.longitude;
                            const url = `https://router.project-osrm.org/route/v1/driving/${currentHomeLatLng.lng},${currentHomeLatLng.lat};${destLng},${destLat}?overview=false`;
                            try {
                                const res = await fetch(url);
                                const data = await res.json();
                                if (data.code === 'Ok' && data.routes.length > 0) {
                                    newRoutes[job.id] = {
                                        osrmDurationMin: Math.round(data.routes[0].duration / 60),
                                        distanceKm: parseFloat((data.routes[0].distance / 1000).toFixed(1))
                                    };
                                }
                            } catch (err) {}
                        }));
                        setJobRoutes(newRoutes);

                        fetchedJobs = fetchedJobs.filter(job => {
                            if (!newRoutes[job.id]) return false;
                            const currentModeDur = getCalculatedDuration(newRoutes[job.id].distanceKm, newRoutes[job.id].osrmDurationMin, transportMode);
                            return currentModeDur <= maxDuration;
                        });
                    }

                    if (isLoadMore) setJobs(prev => [...prev, ...fetchedJobs]);
                    else setJobs(fetchedJobs);
                    
                    setPage(targetPage);
                    setSelectedJob(null);
                    setHasSearched(true);
                    setShowFilters(false);
                } finally {
                    setIsSearching(false);
                }
            };

            const mockSearch = (targetPage, currentHomeLatLng) => {
                if (targetPage > 0) { setHasMore(false); return []; } 
                setHasMore(false);
                return MOCK_JOBS.filter(job => 
                    (job.intitule.toLowerCase().includes(searchQuery.toLowerCase()) || job.description.toLowerCase().includes(searchQuery.toLowerCase())) &&
                    (filterContract === '' || job.typeContrat.includes(filterContract)) &&
                    (filterExperience === '' || job.experienceLibelle.includes(filterExperience === '1' ? 'Débutant' : 'exigée')) &&
                    (!filterRemote || job.teletravailPossible === true)
                );
            };

            const calculateRouteGeometry = useCallback(async (job, origin = homeLatLng) => {
                if (!job || !origin || !window.L || !mapInstanceRef.current || !job.lieuTravail?.latitude) return;
                try {
                    if (routeLayerRef.current) routeLayerRef.current.remove();
                    const url = `https://router.project-osrm.org/route/v1/driving/${origin.lng},${origin.lat};${job.lieuTravail.longitude},${job.lieuTravail.latitude}?overview=full&geometries=geojson`;
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.code === 'Ok' && data.routes.length > 0) {
                        let routeColor = transportMode === 'driving' ? '#2563eb' : transportMode === 'transit' ? '#9333ea' : '#16a34a';
                        routeLayerRef.current = window.L.geoJSON(data.routes[0].geometry, {
                            style: { color: routeColor, weight: 6, opacity: 0.7, dashArray: transportMode === 'transit' ? '5, 10' : null }
                        }).addTo(mapInstanceRef.current);

                        const bounds = routeLayerRef.current.getBounds();
                        mapInstanceRef.current.fitBounds(bounds, { paddingTopLeft: hasSearched ? [420, 50] : [50, 50], paddingBottomRight: [50, 50] });
                    }
                } catch (err) { console.error("Erreur OSRM:", err); }
            }, [homeLatLng, hasSearched, transportMode]);

            useEffect(() => {
                if (selectedJob && homeLatLng) calculateRouteGeometry(selectedJob);
                else if (routeLayerRef.current) routeLayerRef.current.remove();
            }, [selectedJob, homeLatLng, calculateRouteGeometry]);

            useEffect(() => {
                if (!isMapLoaded || !window.L || !mapInstanceRef.current) return;
                Object.values(markersRef.current).forEach(marker => marker.remove());
                markersRef.current = {};

                const bounds = window.L.latLngBounds();
                let hasValidJobs = false;

                const displayList = viewMode === 'favorites' ? favoriteJobs : jobs;

                displayList.forEach(job => {
                    if (job.lieuTravail && job.lieuTravail.latitude && job.lieuTravail.longitude) {
                        const latLng = [job.lieuTravail.latitude, job.lieuTravail.longitude];
                        const isSelected = selectedJob?.id === job.id;
                        const isFav = favoriteJobs.some(f => f.id === job.id);
                        const type = isSelected ? 'selected' : (isFav ? 'favorite' : 'exact');
                        
                        const icon = createCustomIcon(type, isSelected);
                        const marker = window.L.marker(latLng, { icon }).addTo(mapInstanceRef.current);
                        
                        marker.on('click', () => { setSelectedJob(job); setDetailedJob(job); });
                        markersRef.current[job.id] = marker;
                        bounds.extend(latLng);
                        hasValidJobs = true;
                    }
                });

                if (hasValidJobs && !selectedJob && !homeLatLng) {
                    mapInstanceRef.current.fitBounds(bounds, { paddingTopLeft: hasSearched ? [420, 50] : [50, 50], paddingBottomRight: [50, 50] });
                }
            }, [jobs, favoriteJobs, viewMode, isMapLoaded, selectedJob, hasSearched, homeLatLng]);

            const displayJobs = useMemo(() => {
                let list = viewMode === 'favorites' ? [...favoriteJobs] : [...jobs];
                if (sortBy === 'date') {
                    list.sort((a, b) => new Date(b.dateCreation) - new Date(a.dateCreation));
                } else if (sortBy === 'duration' && homeLatLng) {
                    list.sort((a, b) => {
                        const durA = jobRoutes[a.id] ? getCalculatedDuration(jobRoutes[a.id].distanceKm, jobRoutes[a.id].osrmDurationMin, transportMode) : 9999;
                        const durB = jobRoutes[b.id] ? getCalculatedDuration(jobRoutes[b.id].distanceKm, jobRoutes[b.id].osrmDurationMin, transportMode) : 9999;
                        return durA - durB;
                    });
                }
                return list;
            }, [jobs, favoriteJobs, viewMode, sortBy, homeLatLng, jobRoutes, transportMode, getCalculatedDuration]);

            const formatTime = (minutes) => {
                if (minutes > 60) return `${Math.floor(minutes / 60)}h ${minutes % 60}min`;
                return `${minutes} min`;
            };

            return (
                <div className="relative w-full h-screen bg-gray-100 overflow-hidden font-sans text-gray-800">
                    <div ref={mapRef} className="absolute inset-0 z-0" />

                    {/* --- HEADER --- */}
                    <div className="absolute top-4 left-4 right-4 z-[1000] flex justify-between items-start pointer-events-none">
                        <div className="flex gap-2 pointer-events-auto">

                                        {/* Outil de Diagnostic */}
                                        <div className="border border-indigo-100 bg-indigo-50 rounded-xl p-4">
                                            <h3 className="text-sm font-bold text-indigo-900 mb-2"><i className="fas fa-stethoscope mr-1"></i> Outil de Diagnostic</h3>
                                            <p className="text-[11px] text-indigo-700 mb-3 leading-tight">Cliquez ci-dessous pour tester votre Client ID et vérifier exactement où la requête est bloquée.</p>
                                            
                                            <button onClick={testApiConnection} disabled={isTestingApi || !ftClientId || !ftClientSecret} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2 rounded-lg shadow transition disabled:opacity-50">
                                                Lancer le test de connexion
                                            </button>

                                            {apiTestResult && (
                                                <div className="mt-3 p-2 bg-white border border-indigo-100 rounded text-xs text-gray-700 font-mono" dangerouslySetInnerHTML={{__html: apiTestResult}}></div>
                                            )}
                                        </div>

                                        <div className="bg-yellow-50 p-3 rounded-lg border border-yellow-200 text-[11px] text-yellow-800 leading-tight">
                                            <i className="fas fa-exclamation-triangle mr-1 text-yellow-600"></i><strong>À savoir pour la Production :</strong><br/>
                                            Même avec un proxy, cette méthode reste expérimentale. Pour un site en ligne définitif, vous devrez faire la demande de token sur votre propre serveur (NodeJS/PHP).
                                        </div>
                                    </div>
                                </div>
                                <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-2">
                                    <button onClick={() => setShowSettings(false)} className="px-4 py-2 text-sm font-bold text-gray-500 hover:bg-gray-200 rounded-lg transition">Fermer</button>
                                    <button onClick={() => { localStorage.setItem('ft_use_real', useRealApi); localStorage.setItem('ft_use_cors_proxy', useCorsProxy); localStorage.setItem('ft_custom_proxy_url', customProxyUrl); localStorage.setItem('ft_client_id', ftClientId); localStorage.setItem('ft_client_secret', ftClientSecret); setShowSettings(false); }} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md transition">Sauvegarder</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
