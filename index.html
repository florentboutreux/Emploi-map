<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche Emploi Map</title>
    
    <!-- Tailwind CSS pour le design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- React & Babel pour faire fonctionner l'application directement dans le navigateur -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- FONCTION UTILITAIRE ---
        const calcDist = (lat1, lon1, lat2, lon2) => {
            const toRad = x => (x * Math.PI) / 180;
            const R = 6371; 
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        // --- DONNÉES DE DÉMONSTRATION ---
        const MOCK_JOBS = [
            { id: "145ABCD", intitule: "Développeur Full-Stack (H/F)", entreprise: { nom: "TECH INNOVATION" }, lieuTravail: { libelle: "75 - PARIS 08", latitude: 48.8738, longitude: 2.3116 }, salaire: { libelle: "45000€ à 55000€" }, dateCreation: "2024-05-20T10:30:00.000Z", description: "Maîtrise de React et Node.js exigée.", typeContrat: "CDI", isSimilar: false },
            { id: "145XYZA", intitule: "Ingénieur Système et Réseau (H/F)", entreprise: { nom: "GLOBAL NETWORKS" }, lieuTravail: { libelle: "92 - LA DEFENSE", latitude: 48.8924, longitude: 2.2370 }, salaire: { libelle: "38000€ à 42000€" }, dateCreation: "2024-05-19T14:15:00.000Z", description: "Gestion des infrastructures cloud.", typeContrat: "CDI", isSimilar: false },
            { id: "146BQWE", intitule: "Chef de Projet IT (H/F)", entreprise: { nom: "AGENCE DIGITALE" }, lieuTravail: { libelle: "75 - PARIS 11", latitude: 48.8629, longitude: 2.3800 }, salaire: { libelle: "3000€ à 3500€ mensuel" }, dateCreation: "2024-05-21T09:00:00.000Z", description: "Pilotage de projets web et agiles.", typeContrat: "CDD - 6 mois", isSimilar: false },
            { id: "146TRPZ", intitule: "Data Analyst Junior (H/F)", entreprise: { nom: "DATA STARTUP" }, lieuTravail: { libelle: "94 - VINCENNES", latitude: 48.8470, longitude: 2.4406 }, salaire: { libelle: "35000€" }, dateCreation: "2024-05-18T16:45:00.000Z", description: "Analyse de données sous Tableau.", typeContrat: "CDI", isSimilar: false },
            { id: "147MLKJ", intitule: "Designer UX/UI (H/F)", entreprise: { nom: "CREATIVE STUDIO" }, lieuTravail: { libelle: "91 - MASSY", latitude: 48.7307, longitude: 2.2713 }, salaire: { libelle: "A négocier" }, dateCreation: "2024-05-21T11:20:00.000Z", description: "Conception d'interfaces sur Figma.", typeContrat: "Freelance", isSimilar: true },
            { id: "148SIMI", intitule: "Intégrateur Web HTML/CSS (H/F)", entreprise: { nom: "WEB AGENCY 93" }, lieuTravail: { libelle: "93 - MONTREUIL", latitude: 48.8623, longitude: 2.4412 }, salaire: { libelle: "30000€" }, dateCreation: "2024-05-22T09:00:00.000Z", description: "Intégration web responsive.", typeContrat: "CDI", isSimilar: true }
        ];

        function App() {
            const [hasSearched, setHasSearched] = useState(false);
            const [jobs, setJobs] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            
            const [addressQuery, setAddressQuery] = useState('');
            const [addressSuggestions, setAddressSuggestions] = useState([]);
            const [isSuggesting, setIsSuggesting] = useState(false);
            const [homeLatLng, setHomeLatLng] = useState(null);
            
            const [showSettings, setShowSettings] = useState(false);
            const [useRealApi, setUseRealApi] = useState(() => localStorage.getItem('ft_use_real') === 'true');
            const [ftClientId, setFtClientId] = useState(() => localStorage.getItem('ft_client_id') || '');
            const [ftClientSecret, setFtClientSecret] = useState(() => localStorage.getItem('ft_client_secret') || '');

            const [showFilters, setShowFilters] = useState(false);
            const [transportMode, setTransportMode] = useState('driving'); 
            const [maxDuration, setMaxDuration] = useState(45); 
            const [expandSearch, setExpandSearch] = useState(false); 
            const [jobRoutes, setJobRoutes] = useState({}); 

            const [selectedJob, setSelectedJob] = useState(null);
            const [sortBy, setSortBy] = useState('duration');
            const [isSearching, setIsSearching] = useState(false);
            const [isMapLoaded, setIsMapLoaded] = useState(false);

            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({});
            const homeMarkerRef = useRef(null);
            const routeLayerRef = useRef(null);
            const suggestionBoxRef = useRef(null);

            const getCalculatedDuration = useCallback((baseDistanceKm, baseOsrmDurationMin, mode) => {
                if (mode === 'driving') return baseOsrmDurationMin;
                if (mode === 'cycling') return Math.round((baseDistanceKm / 15) * 60);
                if (mode === 'transit') return Math.round((baseDistanceKm / 20) * 60) + 10;
                return baseOsrmDurationMin;
            }, []);

            useEffect(() => {
                if (!mapRef.current || !window.L || mapInstanceRef.current) return;
                mapInstanceRef.current = window.L.map(mapRef.current, { zoomControl: false }).setView([46.603354, 1.888334], 6);
                window.L.control.zoom({ position: 'topright' }).addTo(mapInstanceRef.current);
                window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(mapInstanceRef.current);
                setIsMapLoaded(true);
            }, []);

            const createCustomIcon = (type, isSelected = false) => {
                if (!window.L) return null;
                let color = '#2563eb'; 
                if (type === 'home') color = '#16a34a'; 
                else if (isSelected) color = '#dc2626'; 
                else if (type === 'similar') color = '#f59e0b'; 

                const svgPath = type === 'home' 
                    ? `<circle cx="12" cy="12" r="10" fill="${color}" stroke="white" stroke-width="2"/>`
                    : `<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="${color}" stroke="white" stroke-width="1"/>`;
                
                return window.L.divIcon({
                    html: `<svg viewBox="0 0 24 24" width="30" height="30" xmlns="http://www.w3.org/2000/svg">${svgPath}</svg>`,
                    className: '', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30]
                });
            };

            useEffect(() => {
                if (!isSuggesting || addressQuery.length < 3) {
                    setAddressSuggestions([]);
                    return;
                }
                const timer = setTimeout(async () => {
                    try {
                        const response = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(addressQuery)}&limit=5`);
                        const data = await response.json();
                        setAddressSuggestions(data.features || []);
                    } catch (err) { console.error(err); }
                }, 300);
                return () => clearTimeout(timer);
            }, [addressQuery, isSuggesting]);

            const handleSelectAddress = (feature) => {
                setAddressQuery(feature.properties.label);
                setAddressSuggestions([]);
                setIsSuggesting(false);
                const coords = feature.geometry.coordinates;
                const latLng = { lat: coords[1], lng: coords[0] };
                setHomeLatLng(latLng);
                
                if (homeMarkerRef.current) homeMarkerRef.current.remove();
                const icon = createCustomIcon('home');
                homeMarkerRef.current = window.L.marker([latLng.lat, latLng.lng], { icon })
                    .addTo(mapInstanceRef.current)
                    .bindPopup("<b>Votre domicile</b><br/>" + feature.properties.label).openPopup();

                mapInstanceRef.current.setView([latLng.lat, latLng.lng], 12);
                return latLng;
            };

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (suggestionBoxRef.current && !suggestionBoxRef.current.contains(event.target)) setIsSuggesting(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const handleSearch = async () => {
                setIsSearching(true);
                let currentHomeLatLng = homeLatLng;
                if (addressQuery && !currentHomeLatLng && addressSuggestions.length > 0) {
                    currentHomeLatLng = handleSelectAddress(addressSuggestions[0]);
                }

                try {
                    let fetchedJobs = [];
                    if (useRealApi && ftClientId && ftClientSecret) {
                        try {
                            const tokenParams = new URLSearchParams();
                            tokenParams.append('grant_type', 'client_credentials');
                            tokenParams.append('client_id', ftClientId);
                            tokenParams.append('client_secret', ftClientSecret);
                            tokenParams.append('scope', 'api_offresdemploiv2 o2dsoffre');

                            const tokenRes = await fetch('https://entreprise.francetravail.fr/connexion/oauth2/access_token?realm=%2Fpartenaire', {
                                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: tokenParams.toString()
                            });
                            if (!tokenRes.ok) throw new Error("Échec d'authentification");
                            const tokenData = await tokenRes.json();

                            const searchParams = new URLSearchParams();
                            if (searchQuery) searchParams.append('motsCles', searchQuery);
                            
                            const queryString = searchParams.toString();
                            const jobsUrl = `https://api.francetravail.io/partenaire/offresdemploi/v2/offres/search${queryString ? '?' + queryString : ''}`;
                            
                            const jobsRes = await fetch(jobsUrl, {
                                headers: { Authorization: `Bearer ${tokenData.access_token}`, Accept: 'application/json' }
                            });

                            if (jobsRes.status === 204) fetchedJobs = [];
                            else if (!jobsRes.ok) throw new Error("Échec de la récupération");
                            else {
                                const jobsData = await jobsRes.json();
                                fetchedJobs = jobsData.resultats || [];
                                fetchedJobs = fetchedJobs.map((j, idx) => ({ ...j, isSimilar: idx % 4 === 0 })); 
                            }
                        } catch (error) {
                            console.error("Erreur API France Travail:", error);
                            fetchedJobs = MOCK_JOBS.filter(job => 
                                job.intitule.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                job.description.toLowerCase().includes(searchQuery.toLowerCase())
                            );
                        }
                    } else {
                        await new Promise(resolve => setTimeout(resolve, 500)); 
                        fetchedJobs = MOCK_JOBS.filter(job => 
                            job.intitule.toLowerCase().includes(searchQuery.toLowerCase()) || 
                            job.description.toLowerCase().includes(searchQuery.toLowerCase())
                        );
                    }

                    let filteredJobs = expandSearch ? fetchedJobs : fetchedJobs.filter(j => !j.isSimilar);

                    if (currentHomeLatLng) {
                        const routes = {};
                        await Promise.all(filteredJobs.map(async (job) => {
                            const destLat = job.lieuTravail.latitude;
                            const destLng = job.lieuTravail.longitude;
                            const url = `https://router.project-osrm.org/route/v1/driving/${currentHomeLatLng.lng},${currentHomeLatLng.lat};${destLng},${destLat}?overview=false`;
                            try {
                                const res = await fetch(url);
                                const data = await res.json();
                                if (data.code === 'Ok' && data.routes.length > 0) {
                                    routes[job.id] = {
                                        osrmDurationMin: Math.round(data.routes[0].duration / 60),
                                        distanceKm: parseFloat((data.routes[0].distance / 1000).toFixed(1))
                                    };
                                }
                            } catch (err) { console.error(err); }
                        }));
                        setJobRoutes(routes);

                        filteredJobs = filteredJobs.filter(job => {
                            if (!routes[job.id]) return false;
                            const currentModeDuration = getCalculatedDuration(routes[job.id].distanceKm, routes[job.id].osrmDurationMin, transportMode);
                            return currentModeDuration <= maxDuration;
                        });
                    } else {
                        setJobRoutes({});
                    }

                    setJobs(filteredJobs);
                    setSelectedJob(null);
                    setHasSearched(true);
                    setShowFilters(false);
                } finally {
                    setIsSearching(false);
                }
            };

            const calculateRouteGeometry = useCallback(async (job, origin = homeLatLng) => {
                if (!job || !origin || !window.L || !mapInstanceRef.current) return;
                try {
                    if (routeLayerRef.current) routeLayerRef.current.remove();
                    const destLat = job.lieuTravail.latitude;
                    const destLng = job.lieuTravail.longitude;
                    const url = `https://router.project-osrm.org/route/v1/driving/${origin.lng},${origin.lat};${destLng},${destLat}?overview=full&geometries=geojson`;
                    
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.code === 'Ok' && data.routes.length > 0) {
                        let routeColor = transportMode === 'driving' ? '#2563eb' : transportMode === 'transit' ? '#9333ea' : '#16a34a';
                        const route = data.routes[0];
                        routeLayerRef.current = window.L.geoJSON(route.geometry, {
                            style: { color: routeColor, weight: 6, opacity: 0.7, dashArray: transportMode === 'transit' ? '5, 10' : null }
                        }).addTo(mapInstanceRef.current);

                        const bounds = routeLayerRef.current.getBounds();
                        mapInstanceRef.current.fitBounds(bounds, { paddingTopLeft: hasSearched ? [420, 50] : [50, 50], paddingBottomRight: [50, 50] });
                    }
                } catch (err) { console.error("Erreur OSRM:", err); }
            }, [homeLatLng, hasSearched, transportMode]);

            useEffect(() => {
                if (selectedJob && homeLatLng) calculateRouteGeometry(selectedJob);
                else if (routeLayerRef.current) routeLayerRef.current.remove();
            }, [selectedJob, homeLatLng, calculateRouteGeometry]);

            useEffect(() => {
                if (!isMapLoaded || !window.L || !mapInstanceRef.current) return;
                Object.values(markersRef.current).forEach(marker => marker.remove());
                markersRef.current = {};

                const bounds = window.L.latLngBounds();
                let hasValidJobs = false;

                jobs.forEach(job => {
                    if (job.lieuTravail && job.lieuTravail.latitude && job.lieuTravail.longitude) {
                        const latLng = [job.lieuTravail.latitude, job.lieuTravail.longitude];
                        const isSelected = selectedJob?.id === job.id;
                        const type = isSelected ? 'selected' : (job.isSimilar ? 'similar' : 'exact');
                        
                        const icon = createCustomIcon(type, isSelected);
                        const marker = window.L.marker(latLng, { icon }).addTo(mapInstanceRef.current);
                        marker.on('click', () => setSelectedJob(job));

                        markersRef.current[job.id] = marker;
                        bounds.extend(latLng);
                        hasValidJobs = true;
                    }
                });

                if (hasValidJobs && !selectedJob && !homeLatLng) {
                    mapInstanceRef.current.fitBounds(bounds, { 
                        paddingTopLeft: hasSearched ? [420, 50] : [50, 50], paddingBottomRight: [50, 50]
                    });
                }
            }, [jobs, isMapLoaded, selectedJob, hasSearched, homeLatLng]);

            const sortedJobs = useMemo(() => {
                let sorted = [...jobs];
                if (sortBy === 'date') {
                    sorted.sort((a, b) => new Date(b.dateCreation) - new Date(a.dateCreation));
                } else if (sortBy === 'duration' && homeLatLng) {
                    sorted.sort((a, b) => {
                        const routeA = jobRoutes[a.id];
                        const routeB = jobRoutes[b.id];
                        const durA = routeA ? getCalculatedDuration(routeA.distanceKm, routeA.osrmDurationMin, transportMode) : 9999;
                        const durB = routeB ? getCalculatedDuration(routeB.distanceKm, routeB.osrmDurationMin, transportMode) : 9999;
                        return durA - durB;
                    });
                }
                return sorted;
            }, [jobs, sortBy, homeLatLng, jobRoutes, transportMode, getCalculatedDuration]);

            const formatTime = (minutes) => {
                if (minutes > 60) return `${Math.floor(minutes / 60)}h ${minutes % 60}min`;
                return `${minutes} min`;
            };

            return (
                <div className="relative w-full h-screen bg-gray-100 overflow-hidden font-sans text-gray-800">
                    <div ref={mapRef} className="absolute inset-0 z-0" />

                    <button 
                        onClick={() => setShowSettings(true)}
                        className="absolute top-4 right-4 z-[1000] bg-white p-2.5 rounded-xl shadow-lg border border-gray-100 text-gray-600 hover:text-blue-600 transition"
                    >
                        <i className="fas fa-cog text-xl"></i>
                    </button>

                    {!hasSearched && (
                        <div className="absolute inset-0 bg-black bg-opacity-20 z-10 pointer-events-none transition-opacity duration-700" />
                    )}

                    <div className={`absolute z-[1000] transition-all duration-700 ease-in-out ${hasSearched ? 'top-4 left-4 w-[90%] md:w-[450px]' : 'top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[90%] md:w-[700px]'}`}>
                        <div className="bg-white rounded-2xl shadow-2xl border border-gray-100 flex flex-col p-2 gap-2">
                            <div className="flex flex-col md:flex-row gap-2">
                                <div className="relative flex-1 flex items-center bg-gray-50 rounded-xl px-3 py-2">
                                    <i className="fas fa-search text-gray-400 mr-2 text-lg"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Métier, compétence..." 
                                        className="w-full bg-transparent text-sm focus:outline-none text-gray-700 placeholder-gray-400"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                                    />
                                </div>
                                <div className="hidden md:block w-px bg-gray-200 my-2" />
                                <div className="relative flex-1 flex items-center bg-gray-50 rounded-xl px-3 py-2" ref={suggestionBoxRef}>
                                    <i className="fas fa-map-marker-alt text-gray-400 mr-2 text-lg"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Domicile (Ville...)" 
                                        className="w-full bg-transparent text-sm focus:outline-none text-gray-700 placeholder-gray-400"
                                        value={addressQuery}
                                        onChange={(e) => {
                                            setAddressQuery(e.target.value);
                                            setIsSuggesting(true);
                                            if (homeLatLng) setHomeLatLng(null); 
                                        }}
                                        onFocus={() => setIsSuggesting(true)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                                    />
                                    {isSuggesting && addressSuggestions.length > 0 && (
                                        <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden z-[1001]">
                                            {addressSuggestions.map((feature) => (
                                                <div 
                                                    key={feature.properties.id}
                                                    className="px-4 py-3 hover:bg-gray-50 cursor-pointer text-sm border-b border-gray-50 flex items-center gap-2"
                                                    onClick={() => handleSelectAddress(feature)}
                                                >
                                                    <i className="fas fa-map-marker-alt text-gray-400"></i>
                                                    <span className="truncate">{feature.properties.label}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <button 
                                    onClick={() => setShowFilters(!showFilters)}
                                    className={`p-2 rounded-xl transition flex-shrink-0 flex items-center justify-center relative ${showFilters ? 'bg-blue-100 text-blue-700' : 'bg-gray-50 text-gray-500 hover:text-gray-800'}`}
                                >
                                    <i className="fas fa-sliders-h text-lg"></i>
                                    {(expandSearch || transportMode !== 'driving' || maxDuration !== 45) && !showFilters && (
                                        <span className="absolute top-1 right-1 w-2 h-2 bg-blue-500 rounded-full"></span>
                                    )}
                                </button>
                                <button 
                                    onClick={handleSearch}
                                    className="bg-blue-600 hover:bg-blue-700 text-white rounded-xl px-5 py-3 md:py-2 text-sm font-semibold transition shadow-md flex-shrink-0 flex items-center justify-center gap-2"
                                    disabled={isSearching}
                                >
                                    {isSearching ? <span className="animate-pulse">...</span> : 'Chercher'}
                                </button>
                            </div>

                            <div className={`overflow-hidden transition-all duration-300 ease-in-out ${showFilters ? 'max-h-[500px] opacity-100 mt-2' : 'max-h-0 opacity-0'}`}>
                                <div className="p-4 border-t border-gray-100 bg-gray-50/80 rounded-b-xl space-y-4">
                                    <div className="flex items-center justify-between bg-white p-3 rounded-xl border border-gray-200">
                                        <div className="flex items-center gap-2 text-sm text-gray-700 font-medium">
                                            <div className={`p-1.5 rounded-lg ${expandSearch ? 'bg-orange-100 text-orange-600' : 'bg-gray-100 text-gray-500'}`}>
                                                <i className="fas fa-code-branch"></i>
                                            </div>
                                            Élargir aux métiers similaires
                                        </div>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={expandSearch} onChange={(e) => setExpandSearch(e.target.checked)}/>
                                            <div className="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-500"></div>
                                        </label>
                                    </div>

                                    <div className="flex flex-col md:flex-row gap-4">
                                        <div className="flex-1">
                                            <label className="text-xs font-semibold text-gray-600 mb-2 block uppercase tracking-wide">Transport</label>
                                            <div className="flex gap-2 bg-white p-1 rounded-xl border border-gray-200">
                                                <button onClick={() => setTransportMode('driving')} className={`flex-1 py-1.5 flex items-center justify-center gap-1 text-sm rounded-lg transition ${transportMode === 'driving' ? 'bg-blue-100 text-blue-700 font-bold' : 'text-gray-500 hover:bg-gray-50'}`}><i className="fas fa-car"></i> <span className="hidden sm:inline">Auto</span></button>
                                                <button onClick={() => setTransportMode('transit')} className={`flex-1 py-1.5 flex items-center justify-center gap-1 text-sm rounded-lg transition ${transportMode === 'transit' ? 'bg-purple-100 text-purple-700 font-bold' : 'text-gray-500 hover:bg-gray-50'}`}><i className="fas fa-bus"></i> <span className="hidden sm:inline">Transit</span></button>
                                                <button onClick={() => setTransportMode('cycling')} className={`flex-1 py-1.5 flex items-center justify-center gap-1 text-sm rounded-lg transition ${transportMode === 'cycling' ? 'bg-green-100 text-green-700 font-bold' : 'text-gray-500 hover:bg-gray-50'}`}><i className="fas fa-bicycle"></i> <span className="hidden sm:inline">Vélo</span></button>
                                            </div>
                                        </div>
                                        <div className="flex-[1.5]">
                                            <div className="flex justify-between items-end mb-2">
                                                <label className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Trajet max.</label>
                                                <span className="text-sm font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">{maxDuration === 120 ? 'Illimité' : formatTime(maxDuration)}</span>
                                            </div>
                                            <input type="range" min="10" max="120" step="5" value={maxDuration} onChange={(e) => setMaxDuration(parseInt(e.target.value))} disabled={!addressQuery} className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600 disabled:opacity-50"/>
                                        </div>
                                    </div>
                                    {!addressQuery && <p className="text-[11px] text-red-500 mt-1 text-center font-medium">⚠️ Domicile obligatoire pour filtrer par temps.</p>}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className={`absolute left-4 bottom-4 w-[90%] md:w-[450px] bg-white rounded-2xl shadow-xl border border-gray-100 flex flex-col z-[990] transition-all duration-700 ease-in-out ${hasSearched ? 'translate-x-0 opacity-100' : '-translate-x-[150%] opacity-0'}`} style={{ top: hasSearched ? (showFilters ? '280px' : '90px') : '90px' }}>
                        <div className="px-5 py-4 border-b border-gray-100 flex items-center justify-between bg-gray-50 rounded-t-2xl">
                            <span className="text-sm text-gray-700 font-semibold">{jobs.length} offre{jobs.length > 1 ? 's' : ''}</span>
                            <div className="flex items-center gap-2">
                                <i className="fas fa-filter text-gray-400"></i>
                                <select className="text-sm bg-white border border-gray-200 rounded-lg py-1.5 px-2 text-gray-700 outline-none focus:border-blue-500 shadow-sm" value={sortBy} onChange={(e) => { if (e.target.value === 'duration' && !homeLatLng) return alert("Indiquez votre domicile."); setSortBy(e.target.value); }}>
                                    <option value="duration">Trajet le plus rapide</option>
                                    <option value="date">Plus récentes</option>
                                </select>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-3 space-y-3">
                            {sortedJobs.length === 0 ? (
                                <div className="text-center p-8 text-gray-500 flex flex-col items-center">
                                    <i className="fas fa-map text-4xl mb-3 text-gray-300"></i>
                                    <p>Aucune offre ne correspond à vos critères.</p>
                                </div>
                            ) : (
                                sortedJobs.map((job) => {
                                    const route = jobRoutes[job.id];
                                    const estimatedDuration = route ? getCalculatedDuration(route.distanceKm, route.osrmDurationMin, transportMode) : null;
                                    const isSim = job.isSimilar;
                                    const borderColor = selectedJob?.id === job.id ? 'border-blue-500' : (isSim ? 'border-orange-200' : 'border-gray-100');
                                    const badgeColor = isSim ? 'bg-orange-50 text-orange-700' : 'bg-blue-50 text-blue-700';

                                    return (
                                        <div key={job.id} onClick={() => setSelectedJob(job)} className={`bg-white p-4 rounded-xl border-2 transition cursor-pointer hover:shadow-md ${borderColor}`}>
                                            <div className="flex justify-between items-start gap-2 mb-2">
                                                <h3 className="font-bold text-gray-900 leading-tight flex-1 text-sm">{job.intitule}</h3>
                                                <span className={`${badgeColor} text-[10px] uppercase tracking-wide px-2 py-1 rounded font-bold whitespace-nowrap`}>{isSim ? 'PROCHE' : (job.typeContrat || 'CDI')}</span>
                                            </div>
                                            <p className="text-sm text-gray-600 font-medium mb-3 flex items-center gap-1"><i className="fas fa-briefcase text-gray-400"></i> {job.entreprise?.nom}</p>
                                            <div className="space-y-1.5 text-xs text-gray-500 mb-3">
                                                <div className="flex items-center gap-2"><i className="fas fa-map-marker-alt"></i> <span>{job.lieuTravail?.libelle}</span></div>
                                            </div>
                                            {estimatedDuration && (
                                                <div className={`text-xs font-semibold px-2.5 py-1.5 rounded-lg inline-flex items-center gap-2 border ${transportMode === 'driving' ? 'bg-blue-50/80 text-blue-800 border-blue-100' : transportMode === 'transit' ? 'bg-purple-50/80 text-purple-800 border-purple-100' : 'bg-green-50/80 text-green-800 border-green-100'}`}>
                                                    {transportMode === 'driving' && <i className="fas fa-car"></i>}
                                                    {transportMode === 'transit' && <i className="fas fa-bus"></i>}
                                                    {transportMode === 'cycling' && <i className="fas fa-bicycle"></i>}
                                                    {formatTime(estimatedDuration)}
                                                    <span className="opacity-60 font-medium font-normal hidden sm:inline">(~ {route.distanceKm} km)</span>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>

                    {selectedJob && (
                        <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-[1000] w-[90%] max-w-sm bg-white rounded-2xl shadow-2xl border border-gray-200 p-5 hidden md:block">
                            <button onClick={() => setSelectedJob(null)} className="absolute top-3 right-3 text-gray-400 hover:text-gray-700 bg-gray-100 rounded-full w-6 h-6 flex items-center justify-center"><i className="fas fa-times"></i></button>
                            {selectedJob.isSimilar && <div className="text-[10px] uppercase font-bold text-orange-600 bg-orange-50 inline-block px-2 py-0.5 rounded mb-2">Compétence similaire</div>}
                            <h3 className="font-bold text-base pr-6 mb-1 leading-tight">{selectedJob.intitule}</h3>
                            <p className="text-blue-600 font-semibold text-sm mb-2">{selectedJob.entreprise?.nom}</p>
                            <p className="text-xs text-gray-600 line-clamp-3 mb-4 leading-relaxed">{selectedJob.description}</p>
                            <button onClick={() => window.open(`https://candidat.francetravail.fr/offres/recherche/detail/${selectedJob.id}`, '_blank')} className="w-full bg-gray-900 text-white py-2 rounded-xl text-sm font-medium hover:bg-black transition flex items-center justify-center gap-2">
                                Détails de l'offre <i className="fas fa-external-link-alt"></i>
                            </button>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-[2000] flex items-center justify-center bg-black bg-opacity-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                    <h2 className="font-bold text-gray-800 flex items-center gap-2"><i className="fas fa-cog"></i> Configuration France Travail</h2>
                                    <button onClick={() => setShowSettings(false)} className="text-gray-400 hover:text-gray-700"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="p-5 space-y-4">
                                    <div className="flex items-center justify-between bg-blue-50 p-3 rounded-xl border border-blue-100">
                                        <span className="text-sm font-semibold text-blue-900">Activer l'API réelle</span>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={useRealApi} onChange={(e) => setUseRealApi(e.target.checked)}/>
                                            <div className="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                        </label>
                                    </div>
                                    <div className={`space-y-3 transition-opacity ${!useRealApi ? 'opacity-40 pointer-events-none' : ''}`}>
                                        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Client ID</label><input type="text" className="w-full text-sm bg-gray-50 border border-gray-200 rounded-lg py-2 px-3 outline-none focus:border-blue-500" value={ftClientId} onChange={(e) => setFtClientId(e.target.value)} placeholder="PAR_votrenom_..."/></div>
                                        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Client Secret</label><input type="password" className="w-full text-sm bg-gray-50 border border-gray-200 rounded-lg py-2 px-3 outline-none focus:border-blue-500" value={ftClientSecret} onChange={(e) => setFtClientSecret(e.target.value)} placeholder="••••••••••••"/></div>
                                        <div className="bg-amber-50 p-3 rounded-lg border border-amber-100 text-[11px] text-amber-800 leading-tight"><i className="fas fa-exclamation-circle mr-1"></i><strong>Attention CORS :</strong> L'appel direct à l'authentification depuis le navigateur est souvent bloqué par France Travail.</div>
                                    </div>
                                </div>
                                <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-2">
                                    <button onClick={() => setShowSettings(false)} className="px-4 py-2 text-sm font-semibold text-gray-600 hover:bg-gray-200 rounded-lg transition">Annuler</button>
                                    <button onClick={() => { localStorage.setItem('ft_use_real', useRealApi); localStorage.setItem('ft_client_id', ftClientId); localStorage.setItem('ft_client_secret', ftClientSecret); setShowSettings(false); }} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-semibold shadow-md transition">Sauvegarder</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
